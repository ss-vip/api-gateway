<!DOCTYPE html>
<html lang="zh-TW" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <title>API Gateway</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxNiIgaGVpZ2h0PSIxNiIgZmlsbD0iI0ZGQzEwNyIgdmlld0JveD0iMCAwIDE2IDE2Ij48cGF0aCBkPSJNMTEuMjUxLjA2OGEuNS41IDAgMCAxIC4yMjcuNThMOS42NzcgNi41SDEzYS41LjUgMCAwIDEgLjM2NC44NDNsLTggOC41YS41LjUgMCAwIDEtLjg0Mi0uNDlMNS45OSA5LjVIM2EuNS41IDAgMCAxLS4zNzItLjgzNGw4LTguNWEuNS41IDAgMCAxIC40MjMtLjE5OHoiLz48L3N2Zz4=">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" crossorigin="anonymous" />
  <link href="https://cdn.jsdelivr.net/npm/notyf@3.10.0/notyf.min.css" rel="stylesheet" crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root { --bs-body-font-family: 'Outfit', system-ui, -apple-system, sans-serif; }
    body { background: var(--bs-tertiary-bg); transition: background-color 0.2s, color 0.2s; min-height: 100vh; }
    #login-view, #setup-view, #admin-view { display: none; }
    .navbar { backdrop-filter: blur(10px); background: rgba(var(--bs-body-bg-rgb), 0.8) !important; }
    .form-switch .form-check-input { cursor: pointer; margin-top: 0; }
    .form-check { min-height: auto; padding-top: 0; padding-bottom: 0; }
    .table td, .table th { vertical-align: middle; padding: 0.5rem; }
    #loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
    #loading-overlay.hide { display: none; }
    .notyf { z-index: 10000 !important; }
    .stat-card { border-left: 4px solid var(--bs-primary); }
    .table-responsive { border-radius: 0.75rem; overflow: hidden; }
    @media (max-width: 576px) {
      .navbar-brand { font-size: 1rem; }
      .btn-sm { padding: 0.25rem 0.5rem; font-size: 0.75rem; }
      .card-header span { font-size: 0.85rem; }
    }
    @media (max-width: 991.98px) {
      .table th, .table td { padding: 0.4rem 0.3rem; }
      .table td .btn-sm { padding: 0.15rem 0.35rem; font-size: 0.65rem; }
    }
    @media (max-width: 767.98px) {
      .container { padding-left: 0.5rem; padding-right: 0.5rem; }
      .table th, .table td { padding: 0.3rem 0.2rem; font-size: 0.7rem; }
    }
    #loading-overlay .spinner-border { display: inline-block; width: 2rem; height: 2rem; border: 0.25em solid #fff; border-right-color: transparent; border-radius: 50%; animation: spinner-border 0.75s linear infinite; }
    .mini-label { font-size: 0.65rem; margin-bottom: 2px; text-transform: uppercase; color: var(--bs-secondary); }
    #chModal .modal-body { padding-top: 0; }
    .tab-pane-wrap { border: 1px solid var(--bs-border-color); border-top: none; border-radius: 0 0 0.375rem 0.375rem; padding: 0.75rem; height: 320px; overflow-y: auto; overflow-x: hidden; }
    .tab-pane-wrap .tab-pane { display: none; }
    .tab-pane-wrap .tab-pane.active { display: block; }
    .pwd-mask { -webkit-text-security: disc; }
  </style>
</head>
<body>
  <div id="loading-overlay"><div class="spinner-border text-light" role="status"></div></div>
  <script>
  setTimeout(function(){
    var e=document.getElementById('loading-overlay');
    if(e)e.classList.add('hide');
    document.body.classList.remove('loading');
    var l=document.getElementById('login-view'),s=document.getElementById('setup-view'),a=document.getElementById('admin-view');
    if(l&&s&&a&&l.style.display!=='block'&&s.style.display!=='block'&&a.style.display!=='block'){
      l.style.display='block';
      document.getElementById('login-pass')?.focus();
    }
  },3000);
  </script>

  <div id="login-view" class="container py-5 mt-5">
    <div class="row justify-content-center pt-5"><div class="col-md-4"><div class="card p-4"><div class="card-body text-center">
      <h4 class="fw-bold mb-4">API Gateway</h4>
      <form id="loginForm">
        <div class="mb-4 text-start">
          <label class="form-label small fw-bold">ADMIN PASSWORD</label>
          <input type="password" id="login-pass" class="form-control" minLength="6" maxLength="20" required />
        </div>
        <button type="submit" class="btn btn-primary w-100 fw-bold py-2">LOGIN</button>
      </form>
    </div></div></div></div>
  </div>

  <div id="setup-view" class="container py-5 mt-5">
    <div class="row justify-content-center pt-5"><div class="col-md-4"><div class="card p-4"><div class="card-body text-center">
      <h4 class="fw-bold mb-4">API Gateway</h4>
      <p class="text-muted small mb-3">請設定管理員密碼</p>
      <form id="setupForm">
        <div class="mb-4 text-start">
          <label class="form-label small fw-bold">NEW PASSWORD</label>
          <input type="password" id="setup-pass" class="form-control" minLength="6" maxLength="20" required />
        </div>
        <button type="submit" class="btn btn-success w-100 fw-bold py-2">SET PASSWORD</button>
      </form>
    </div></div></div></div>
  </div>

  <div id="admin-view">
    <nav class="navbar navbar-expand border-bottom sticky-top mb-4 py-2">
      <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="javascript:location.reload()">API Gateway</a>
        <div class="ms-auto d-flex gap-2 align-items-center flex-wrap justify-content-end">
          <button onclick="saveEverything()" class="btn btn-sm btn-primary fw-bold px-3">SAVE ALL</button>
          <div class="dropdown">
            <button class="btn btn-sm btn-outline-secondary dropdown-toggle fw-bold" data-bs-toggle="dropdown">TOOLS</button>
            <ul class="dropdown-menu dropdown-menu-end shadow border-0">
              <li><button class="dropdown-item py-2 small" onclick="exportChannels()"><i class="bi bi-download me-2"></i>Export JSON</button></li>
              <li><button class="dropdown-item py-2 small" onclick="importChannels()"><i class="bi bi-upload me-2"></i>Import JSON</button></li>
              <li><hr class="dropdown-divider"></li>
              <li><button class="dropdown-item py-2 small" onclick="if(passModal)passModal.show()"><i class="bi bi-shield-lock me-2"></i>Change PW</button></li>
              <li><hr class="dropdown-divider"></li>
              <li><button class="dropdown-item py-2 small text-danger" onclick="resetSystem()"><i class="bi bi-arrow-counterclockwise me-2"></i>System Reset</button></li>
            </ul>
          </div>
          <a href="https://github.com/ss-vip/api-gateway" target="_blank" class="btn btn-sm btn-outline-secondary border-0 px-2" title="GitHub Project"><i class="bi bi-github"></i></a>
          <button onclick="toggleTheme()" class="btn btn-sm btn-outline-secondary border-0 px-2"><i id="theme-icon" class="bi bi-sun"></i></button>
          <button onclick="logout()" class="btn btn-sm btn-outline-danger border-0 px-2" title="LOGOUT"><i class="bi bi-box-arrow-right"></i></button>
        </div>
      </div>
    </nav>

    <div class="container pb-5">
      <div id="stat-content" class="mb-4"></div>

      <div class="card mb-4 border-0 shadow-sm">
        <div class="card-header bg-transparent fw-bold py-3 border-0">
          <div class="d-flex flex-column flex-md-row justify-content-between align-items-stretch align-items-md-center gap-2">
            <div class="d-flex align-items-center gap-2 flex-grow-1">
              <span class="d-none d-md-inline fw-bold">Channels</span>
              <div class="input-group input-group-sm" style="min-width:80px;max-width:260px">
                <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-search"></i></span>
                <input type="text" id="ch-search" class="form-control border-start-0 ps-0" placeholder="Search..." oninput="renderChannels()" />
                <button class="input-group-text bg-transparent border-start-0" onclick="clearSearch()" style="cursor:pointer;border:0"><i class="bi bi-x-lg"></i></button>
              </div>
            </div>
            <div class="d-flex gap-2 flex-wrap">
              <button onclick="openChannelModal()" class="btn btn-outline-primary btn-sm px-3 fw-bold flex-fill flex-md-grow-0">ADD</button>
            </div>
          </div>
        </div>
        <div class="table-responsive">
          <table class="table table-hover mb-0 text-center align-middle small text-nowrap">
            <thead class="table-light">
              <tr class="text-uppercase text-muted small" style="letter-spacing: 0.5px;">
                <th style="width: 60px" class="border-0 cursor-pointer" onclick="toggleSort('id')">ID <i id="sort-id" class="bi bi-arrow-down-up opacity-25"></i></th>
                <th style="width: 80px" class="border-0 text-center align-middle">
                  <div class="d-flex align-items-center justify-content-center gap-1">
                    <span>ON/OFF</span>
                    <input type="checkbox" class="form-check-input" onchange="toggleAllChannels(this.checked)" title="全啟用/全關閉" />
                  </div>
                </th>
                <th class="border-0 cursor-pointer" onclick="toggleSort('name')">Name <i id="sort-name" class="bi bi-arrow-down-up opacity-25"></i></th>
                <th class="border-0 cursor-pointer" onclick="toggleSort('model')">Model <i id="sort-model" class="bi bi-arrow-down-up opacity-25"></i></th>
                <th style="width: 100px" class="d-none d-lg-table-cell border-0 cursor-pointer" onclick="toggleSort('weight')">Weight <i id="sort-weight" class="bi bi-arrow-down-up opacity-25"></i></th>
                <th style="width: 90px" class="d-none d-lg-table-cell border-0 cursor-pointer" onclick="toggleSort('channel_type')">Type <i id="sort-channel_type" class="bi bi-arrow-down-up opacity-25"></i></th>
                <th style="width: 110px" class="d-none d-lg-table-cell border-0 cursor-pointer" onclick="toggleSort('max_context_length')">Max Token <i id="sort-max_context_length" class="bi bi-arrow-down-up opacity-25"></i></th>
                <th style="width: 150px" class="text-center border-0">Actions</th>
              </tr>
            </thead>
            <tbody id="channel-list"></tbody>
          </table>
        </div>
      </div>

      <div class="card border-0 shadow-sm">
        <div class="card-header bg-transparent fw-bold py-3 border-0">
          <div class="d-flex flex-column flex-md-row justify-content-between align-items-stretch align-items-md-center gap-2">
            <div class="d-flex align-items-center gap-2">
              <span class="d-none d-md-inline fw-bold">Filters</span>
              <div class="input-group input-group-sm" style="min-width:80px;max-width:260px">
                <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-search"></i></span>
                <input type="text" id="fl-search" class="form-control border-start-0 ps-0" placeholder="Search..." oninput="renderFilters()" />
                <button class="input-group-text bg-transparent border-start-0" onclick="document.getElementById('fl-search').value='';renderFilters()" style="cursor:pointer;border:0"><i class="bi bi-x-lg"></i></button>
              </div>
            </div>
            <div class="d-flex gap-2">
              <button onclick="addFilter()" class="btn btn-outline-info btn-sm px-3 fw-bold">ADD</button>
            </div>
          </div>
        </div>
        <div class="table-responsive">
          <table class="table table-hover mb-0 text-center small">
            <thead class="table-light">
              <tr>
                <th style="width: 60px" class="align-middle">ID</th>
                <th style="width: 120px" class="align-middle">
                  <div class="d-flex align-items-center justify-content-center gap-1">
                    <span>ON/OFF</span>
                    <input type="checkbox" class="form-check-input" onchange="toggleAllFilters(this.checked)" title="全啟用/全關閉" />
                  </div>
                </th>
                <th class="align-middle">Keyword <i class="bi bi-info-circle" title="要過濾的關鍵字"></i></th>
                <th style="width: 120px" class="d-none d-md-table-cell align-middle">Mode <i class="bi bi-info-circle" title="Truncate: 切除關鍵字及其後內容；Delete: 僅刪除關鍵字"></i></th>
                <th style="width: 60px" class="align-middle">Actions</th>
              </tr>
            </thead>
            <tbody id="filter-list"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <button id="go-top-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})" class="btn btn-primary position-fixed bottom-0 end-0 m-3 rounded-circle p-2" style="width:40px;height:40px;z-index:1060;display:none;" title="Go Top" tabindex="-1"><i class="bi bi-arrow-up"></i></button>

  <div class="modal fade" id="passModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered modal-sm"><div class="modal-content">
    <div class="modal-header border-0 pb-0"><h5 class="fw-bold">New Login Password</h5><button type="button" class="btn-close ms-auto" data-bs-dismiss="modal" aria-label="Close"></button></div>
    <div class="modal-body p-4"><input type="password" id="new-admin-pass" class="form-control" placeholder="New Password" minLength="6" maxLength="20" required /></div>
    <div class="modal-footer border-0 pt-0"><button onclick="updateAdminPass()" class="btn btn-warning w-100 fw-bold">UPDATE & LOGOUT</button></div>
  </div></div></div>

  <div class="modal fade" id="chModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable" style="max-width:600px"><div class="modal-content">
    <div class="modal-header border-0 pb-0">
      <div class="d-flex align-items-center gap-2">
        <h5 class="fw-bold small mb-0">Channel Editor</h5>
        <span id="ch-id-badge" class="badge bg-secondary" style="display:none"></span>
      </div>
      <button type="button" class="btn-close ms-auto" data-bs-dismiss="modal" aria-label="Close"></button>
    </div>
    <form id="ch-form" autocomplete="off" onsubmit="event.preventDefault(); applyChannel();">
    <div class="modal-body p-3 p-md-4">
      <input type="hidden" id="ch-idx" />
      <input type="hidden" id="ch-id" />
      <ul class="nav nav-tabs" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active" id="basic-tab" onclick="switchTab('basic')" type="button" role="tab" aria-controls="basic-panel" aria-selected="true">Basic</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="option-tab" onclick="switchTab('option')" type="button" role="tab" aria-controls="option-panel" aria-selected="false">Option</button>
        </li>
      </ul>
      <div class="tab-pane-wrap">
        <div class="tab-pane active" id="basic-panel" role="tabpanel" aria-labelledby="basic-tab">
          <div class="row g-2 mb-1">
            <div class="col-6">
              <label class="form-label mini-label fw-bold">Name *</label>
              <input type="text" id="ch-name" class="form-control form-control-sm" required />
            </div>
            <div class="col-3 d-flex flex-column align-items-center justify-content-center">
              <div class="form-check mb-0">
                <input class="form-check-input" type="checkbox" id="ch-support-tools">
                <label class="form-check-label" for="ch-support-tools">Tools</label>
              </div>
            </div>
            <div class="col-3 d-flex flex-column align-items-center justify-content-center">
              <div class="form-check mb-0">
                <input class="form-check-input" type="checkbox" id="ch-support-vision">
                <label class="form-check-label" for="ch-support-vision">Vision</label>
              </div>
            </div>
          </div>
          <div class="mb-1" style="position:relative">
            <label class="form-label mini-label fw-bold">API Key *</label>
            <div class="input-group input-group-sm">
              <input type="text" id="ch-key" class="form-control form-control-sm pwd-mask" autocomplete="off" required />
              <button class="btn btn-outline-secondary" type="button" onclick="toggleKeyVis()" title="Toggle visibility">&#128065;</button>
            </div>
          </div>
          <div class="mb-1">
            <label class="form-label mini-label fw-bold">Base URL * <span class="text-muted" style="font-weight:400">（包含 /v1）</span></label>
            <input type="url" id="ch-url" class="form-control form-control-sm" placeholder="https://api.example.com/v1" required />
          </div>
          <div class="mb-1">
            <label for="ch-model" class="form-label mini-label fw-bold">Model *</label>
            <input type="text" id="ch-model" class="form-control form-control-sm" required />
          </div>
          <div class="mb-1">
            <label class="form-label mini-label fw-bold">Fallback Model <span class="text-muted" style="font-weight:400">（留空 = 不備用）</span></label>
            <input type="text" id="ch-fallback-model" class="form-control form-control-sm" placeholder="gpt-4-turbo">
          </div>
          <div class="row g-2 mb-1">
            <div class="col-3">
              <label class="form-label mini-label fw-bold">RPM</label>
              <input type="number" id="ch-rpm" class="form-control form-control-sm" value="0" min="0">
            </div>
            <div class="col-3">
              <label class="form-label mini-label fw-bold">RPD</label>
              <input type="number" id="ch-rpd" class="form-control form-control-sm" value="0" min="0">
            </div>
            <div class="col-6">
              <label class="form-label mini-label fw-bold">Max Token <span class="text-muted" style="font-weight:400">（0=不限，測試可自動偵測）</span></label>
              <input type="number" id="ch-max-ctx" class="form-control form-control-sm" value="0" min="0" placeholder="12000">
            </div>
          </div>
          <div class="row g-2 mb-1">
            <div class="col-4 d-flex flex-column justify-content-center">
              <label class="form-label mini-label fw-bold">Weight</label>
              <input type="number" id="ch-weight" class="form-control form-control-sm" min="1" max="1000" value="50" required />
            </div>
            <div class="col-4 d-flex flex-column justify-content-center">
              <label class="form-label mini-label fw-bold">Channel Type</label>
              <select id="ch-type" class="form-select form-select-sm" onchange="updateCapabilities()">
                <option value="chat">chat</option>
                <option value="image_gen">image_gen</option>
                <option value="image_edit">image_edit</option>
                <option value="tts">tts</option>
                <option value="stt">stt</option>
                <option value="embed">embed</option>
                <option value="moderate">moderate</option>
                <option value="assistant">assistant</option>
                <option value="fine_tune">fine_tune</option>
                <option value="file">file</option>
                <option value="responses">responses</option>
                <option value="batches">batches</option>
                <option value="models">models</option>
                <option value="realtime">realtime</option>
              </select>
            </div>
            <div class="col-4 d-flex flex-column align-items-center justify-content-center">
              <label class="form-label mini-label fw-bold text-center">Enabled</label>
              <button type="button" id="ch-enabled-btn" class="btn btn-sm btn-outline-success px-3 fw-bold" onclick="chEnabled=!chEnabled;updateEnabledBtn()">已啟用</button>
            </div>
          </div>
        </div>
        <div class="tab-pane" id="option-panel" role="tabpanel" aria-labelledby="option-tab">
          <p class="text-muted small mb-2">自訂 Header 會在轉發請求時附加到上游。</p>
          <div id="header-list" class="mb-2"></div>
          <button type="button" class="btn btn-outline-secondary btn-sm w-100 mt-1 fw-bold" onclick="addHeaderRow()"><i class="bi bi-plus-lg me-1"></i>ADD HEADER</button>
          <hr class="my-2">
          <div class="mb-1">
            <label class="form-label mini-label fw-bold">前置提示訊息 <span class="text-muted" style="font-weight:400">（強制插入到最前面，內容相同時自動去重）</span></label>
            <textarea id="ch-prepend-prompt" class="form-control form-control-sm" rows="4" placeholder="請輸入 system prompt，例如：&#10;你是一個專業的程式設計助手，請全程用繁體中文回答。"></textarea>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer border-0 pt-0"><button type="submit" class="btn btn-primary w-100 fw-bold">APPLY</button></div>
    </form>
  </div></div></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/notyf@3.10.0/notyf.min.js" crossorigin="anonymous"></script>
  <script>
    let _notyf = null;
    const getNotyf = () => {
      if (!_notyf && typeof Notyf !== 'undefined') {
        _notyf = new Notyf({ position: { x: 'right', y: 'bottom' }, ripple: true, dismissible: true, duration: 2500 });
      }
      return _notyf;
    };
    const toast = (msg, type, duration) => {
      const n = getNotyf();
      if (!n) { alert(msg); return; }
      if (type === 'danger') n.error(msg); else n.success(msg);
    };
    const toastHtml = (html, type, duration = 4000) => {
      // 自定義 HTML toast（Notyf 原生不支援 HTML）
      const n = getNotyf();
      if (!n) { alert(html.replace(/<[^>]+>/g, '')); return; }
      const el = document.createElement('div');
      el.style.cssText = 'position:fixed;top:20px;right:20px;z-index:10001;padding:12px 16px;border-radius:8px;background:' + (type === 'danger' ? '#e74c3c' : '#2ecc71') + ';color:#fff;font-size:13px;line-height:1.5;max-width:420px;box-shadow:0 4px 12px rgba(0,0,0,.2);opacity:0;transition:opacity .3s';
      el.innerHTML = html;
      document.body.appendChild(el);
      requestAnimationFrame(() => { el.style.opacity = '1'; });
      setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, duration);
    };
    const confirmAction = (msg, onOk) => { if (window.confirm(msg)) onOk(); };

    let chModal, passModal;
    let channels = [], filters = [];
    let sortKey = null, sortOrder = 0;
    let pendingRequests = 0;
    let chEnabled = true;
    let chHeaders = [];

    const dismissAllModals = () => {
      [chModal, passModal].forEach(m => { if (m) m.hide(); });
    };

    const switchTab = (name) => {
      document.querySelectorAll('#chModal .nav-link').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('#chModal .tab-pane').forEach(p => p.classList.remove('active'));
      document.getElementById(name + '-tab')?.classList.add('active');
      document.getElementById(name + '-panel')?.classList.add('active');
    };

    let loadingTimeout = null;
    const loading = (show) => {
      const el = document.getElementById('loading-overlay');
      if (show) {
        pendingRequests++;
        el.classList.remove('hide');
        if (loadingTimeout) clearTimeout(loadingTimeout);
        loadingTimeout = setTimeout(() => {
          if (pendingRequests > 0) { pendingRequests = 0; el.classList.add('hide'); }
        }, 15000);
      } else {
        pendingRequests = Math.max(0, pendingRequests - 1);
        if (pendingRequests === 0) {
          el.classList.add('hide');
          if (loadingTimeout) { clearTimeout(loadingTimeout); loadingTimeout = null; }
        }
      }
    };

    const updateEnabledBtn = () => {
      const btn = document.getElementById('ch-enabled-btn');
      if (!btn) return;
      btn.className = 'btn btn-sm px-3 fw-bold ' + (chEnabled ? 'btn-outline-success' : 'btn-outline-danger');
      btn.textContent = chEnabled ? '已啟用' : '已停用';
    };

    const updateCapabilities = () => {
      const isChat = document.getElementById('ch-type').value === 'chat';
      ['ch-support-tools', 'ch-support-vision'].forEach(id => {
        const el = document.getElementById(id);
        if (!isChat) { el.checked = false; el.disabled = true; }
        else { el.disabled = false; }
      });
    };

    const api = async (u, m='GET', b=null, showLoader=true, opts={}) => {
      if (showLoader) loading(true);
      const ac = new AbortController();
      const to = setTimeout(() => ac.abort(), opts.timeout || 8000);
      try {
        const r = await fetch(u, {
          method: m,
          headers: {
            'Content-Type': 'application/json',
            'X-Admin-Token': sessionStorage.getItem('adminToken') || '',
          },
          body: b ? JSON.stringify(b) : null,
          signal: ac.signal,
        });
        clearTimeout(to);
        // 收到 session token 升級 header 時存入 storage
        const st = r.headers.get('X-Session-Token');
        if (st) sessionStorage.setItem('adminToken', st);
        if (r.status === 401) {
          dismissAllModals();
          toast('登入階段已過期，請先按右上角 LOGOUT 重新登入，再繼續操作', 'warning');
          // 不立即跳轉到登入頁面，避免操作中的資料遺失（如編輯中的渠道、未存檔設定）
          return null;
        }
        if (!r.ok) {
          const err = await r.json().catch(() => ({}));
          if (!opts.silent) toast(err.error || 'Request Failed', 'danger');
          return null;
        }
        return await r.json();
      } catch (e) {
        clearTimeout(to);
        if (e.name === 'AbortError') {
          if (!opts.silent) toast('請求逾時', 'warning');
        } else {
          if (!opts.silent) toast('Network error: ' + e.message, 'danger');
        }
        return null;
      } finally {
        if (showLoader) loading(false);
      }
    };

    const showLogin = () => {
      sessionStorage.removeItem('adminToken');
      sessionStorage.removeItem('adminLoggedIn');
      document.getElementById('admin-view').style.display = 'none';
      document.getElementById('setup-view').style.display = 'none';
      document.getElementById('login-view').style.display = 'block';
      document.getElementById('login-pass')?.focus();
      loading(false);
    };
    const showSetup = () => {
      document.getElementById('admin-view').style.display = 'none';
      document.getElementById('login-view').style.display = 'none';
      document.getElementById('setup-view').style.display = 'block';
      document.getElementById('setup-pass')?.focus();
      loading(false);
    };
    const showAdmin = async () => {

      document.getElementById('setup-view').style.display = 'none';
      loading(true);
      const ok = await init();
      if (ok) {
        document.getElementById('admin-view').style.display = 'block';

    const logout = () => {

      sessionStorage.removeItem('adminLoggedIn');

    const toggleTheme = () => {

      document.documentElement.setAttribute('data-bs-theme', t);

      localStorage.setItem('theme', t);
    };
    const copyToken = () => {
      const t = document.getElementById('cfg-token');
      navigator.clipboard.writeText(t.value)
        .then(() => toast('Token 已複製', 'success'))
        .catch(() => { t.select(); document.execCommand('copy'); toast('Token 已複製', 'success'); });
    };

    const esc = (s) => {
      const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#x27;' };
      return String(s || '').replace(/[&<>"']/g, ch => map[ch] || '');

    const initTooltips = () => {

    const renderHeaders = () => {
      document.getElementById('header-list').innerHTML = chHeaders.map((h, i) =>
        '<div class="row g-1 mb-1 align-items-center">' +
          '<div class="col-5"><input type="text" class="form-control form-control-sm" placeholder="Header-Name" value="' + esc(h.key) + '" oninput="chHeaders[' + i + '].key=this.value" /></div>' +

    document.getElementById('loginForm').onsubmit = async (e) => {
      e.preventDefault();

      if (!p) return toast('請輸入密碼', 'warning');
      loading(true);
      try {
        const r = await fetch('/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: p }),
        });

          sessionStorage.setItem('adminToken', data.sessionToken || p);
          sessionStorage.setItem('adminLoggedIn', '1');

          toast(data.error || '密碼錯誤', 'danger');

        loading(false);
        toast('網絡或資料庫異常，請確保已執行 D1 初始化', 'danger');

    document.getElementById('setupForm').onsubmit = async (e) => {
      e.preventDefault();
      const p = document.getElementById('setup-pass').value;
      if (!p) return toast('請輸入密碼', 'warning');
      if (p.length < 6 || p.length > 20) return toast('密碼需 6-20 個字', 'warning');
      loading(true);
      try {
        const r = await fetch('/admin/api/admin-pass', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pass: p }),
        });
        if (!r.ok) {
          loading(false);
          const err = await r.json();
          toast(err.error || '設定失敗', 'danger');
          return;
        }
        const loginRes = await fetch('/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: p }),
        });
        loading(false);
        if (loginRes.ok) {
          const loginData = await loginRes.json();
          sessionStorage.setItem('adminToken', loginData.sessionToken || p);
          sessionStorage.setItem('adminLoggedIn', '1');

    const init = async (retries = 2) => {
      for (let i = 0; i <= retries; i++) {
        const batch = await api('/admin/api/init', 'GET', null, true);
        if (batch) {
          channels = batch.channels || [];
          filters = batch.filters || [];
          const el = document.getElementById('cfg-token');
          if (el) el.value = batch.config?.token || '';
          const rl = document.getElementById('cfg-relay-url');
          if (rl) rl.value = batch.config?.relay_url || '';
          const rt = document.getElementById('cfg-relay-token');
          if (rt) rt.value = batch.config?.relay_token || '';
          // We must render stats AFTER setting the values so it picks them up, or pass them in
          renderStats(batch.config?.token || '', batch.config?.relay_url || '', batch.config?.relay_token || '');
          renderChannels();
          renderFilters();
          return true;
        }
        if (i < retries) await new Promise(r => setTimeout(r, 1000 * Math.pow(2, i)));
      }
      // 所有重試失敗 → 導向登入頁面（防止卡在空白畫面）

            '<div class="card border-0 shadow-sm h-100">' +

                '<div class="small text-muted text-uppercase fw-bold mb-1">Relay Token</div>' +
                '<div class="input-group input-group-sm mt-1">' +
                  '<input type="text" id="cfg-relay-token" class="form-control pwd-mask" placeholder="x-relay-token" value="' + relayTokenVal + '" />' +
                  '<button class="btn btn-outline-secondary" onclick="document.getElementById(\'cfg-relay-token\').value=\'\'" title="Clear"><i class="bi bi-x-lg"></i></button>' +
                '</div>' +
              '</div>' +
            '</div>' +
          '</div>' +
        '</div>';
    };

    const renderChannels = () => {
      const query = document.getElementById('ch-search').value.toLowerCase();
      let display = [...channels];

      if (sortKey && sortOrder > 0) {
        display.sort((a, b) => {
          let vA = a[sortKey], vB = b[sortKey];
          if (typeof vA === 'string') vA = vA.toLowerCase();
          if (typeof vB === 'string') vB = vB.toLowerCase();
          if (vA < vB) return sortOrder === 1 ? -1 : 1;
          if (vA > vB) return sortOrder === 1 ? 1 : -1;
          return 0;
        });
      }

      const filtered = display.filter(c =>
        (c.name || '').toLowerCase().includes(query) ||
        (c.model || '').toLowerCase().includes(query)
      );

      ['id','name','model','weight','channel_type','max_context_length'].forEach(k => {
        const icon = document.getElementById('sort-' + k);
        if (!icon) return;
        icon.className = 'bi bi-arrow-down-up opacity-25';
        if (k === sortKey) {
          icon.className = sortOrder === 1
            ? 'bi bi-sort-down-alt text-primary opacity-100'
            : 'bi bi-sort-up text-primary opacity-100';
        }
      });

      document.getElementById('channel-list').innerHTML = filtered.map((c) => {

        row += '<td class="fw-bold align-middle">' + esc(c.name) + '</td>';
        row += '<td class="align-middle"><span style="display:inline-flex;align-items:center;gap:2px"><code class="small copy-model mb-0" style="cursor:pointer" data-model="' + esc(c.model || '') + '" title="點擊複製">' + displayName + '</code>' + (c.channel_type === 'chat' && c.support_tools ? '<span style="font-size:0.7rem;line-height:1">🔧</span>' : '') + (c.channel_type === 'chat' && c.support_vision ? '<span style="font-size:0.7rem;line-height:1">👁️</span>' : '') + '</span></td>';
        row += '<td class="d-none d-lg-table-cell align-middle">' + esc(String(c.weight)) + '</td>';
        row += '<td class="d-none d-lg-table-cell align-middle"><span class="badge bg-primary bg-opacity-10 text-primary small">' + esc(c.channel_type || 'chat') + '</span></td>';

        row += '      <li><hr class="dropdown-divider"></li>';

    const copyModelName = (name) => {
      if (!name) return;
      navigator.clipboard.writeText(name)
        .then(() => toast('Model ID 已複製: ' + name, 'success'))
        .catch(() => {
          const t = document.createElement('textarea');
          t.value = name; document.body.appendChild(t);
          t.select(); document.execCommand('copy');
          document.body.removeChild(t);
          toast('Model ID 已複製: ' + name, 'success');
        });
    };

    const testChannel = async (id, type = 'chat') => {
      if (!id) return toast('請先儲存渠道', 'warning');
      const ch = channels.find(c => c.id === id);
      if (!ch) return toast('渠道不存在', 'warning');
      const btns = document.querySelectorAll('button[onclick*="testChannel(' + id + ')"]');
      btns.forEach(b => { b._orig = b.innerHTML; b.innerHTML = '<span class="spinner-border spinner-border-sm"></span>'; b.disabled = true; });
      toast('⏳ 正在測試 ' + type + ' ...', 'info');
      const r = await api('/admin/api/channels/' + id + '/test', 'POST', {
        base_url: ch.base_url,
        api_key: ch.api_key,
        model: ch.model,
        channel_type: ch.channel_type,
        relay_url: ch.relay_url,
        type,
        autoFix: true,
      }, false);
      btns.forEach(b => { b.innerHTML = b._orig || '<i class="bi bi-play-fill"></i>'; b.disabled = false; });
      if (!r) return;
      const results = r.results || {};
      if (r.ok) {
        let msg = '';
        if (type === 'all') {
          const parts = [];
          for (const [t, rr] of Object.entries(results)) {
            const icon = rr.capOk ? '✅' : '⚠️';
            parts.push(`${icon} <b>${t}</b>: ${rr.diagnosis} (${rr.ms}ms)`);
          }
          msg = parts.join('<br>');
        } else {
          const rr = results[type];
          const icon = rr?.capOk ? '✅' : '⚠️';
          msg = `${icon} <b>${type}</b> ${rr?.diagnosis || r.diagnosis} (${rr?.ms || 0}ms)`;
        }
        // 如果有自動修正，顯示額外資訊
        if (r.capabilities) {
          const fixed = [];
          if (r.capabilities.vision === false) fixed.push('Vision');
          if (r.capabilities.tools === false) fixed.push('Tools');
          if (fixed.length > 0) msg += '<br><span style="color:#f39c12">已自動關閉: ' + fixed.join(', ') + '</span>';
        }
        toastHtml(msg, 'success', 6000);
        // 同步 autoFix 結果到 UI（vision/tools 可能已被關閉，max_token 可能已被更新）
        if (r.capabilities) {
          const batch = await api('/admin/api/init', 'GET', null, false);
          if (batch) { channels = batch.channels || []; filters = batch.filters || []; renderChannels(); renderStats(); }
        }
      } else {
        const diag = typeof r.diagnosis === 'string' ? r.diagnosis : 'unknown';
        toast('❌ 測試失敗: ' + diag, 'danger');
      }
    };

    const updateAdminPass = async () => {
      if (document.activeElement) document.activeElement.blur();
      const p = document.getElementById('new-admin-pass').value;
      if (!p) return toast('請輸入密碼', 'warning');
      confirmAction('更換密碼後將自動登出，確定？', async () => {
        await api('/admin/api/admin-pass', 'POST', { pass: p });
        logout();
      });

    const renderFilters = () => {
      const query = document.getElementById('fl-search')?.value?.toLowerCase() || '';
      const display = query ? filters.filter(f =>

      ) : filters;

        row += '<td class="align-middle"><input type="text" class="form-control form-control-sm" minLength="1" maxLength="30" placeholder="關鍵字（1-30 字）" value="' + esc(f.text) + '" oninput="if(this.value.length<=30)filters[' + realIdx + '].text=this.value"></td>';
        row += '<td class="d-none d-md-table-cell align-middle"><select class="form-select form-select-sm" onchange="filters[' + realIdx + '].mode=parseInt(this.value)"><option value="1" ' + (f.mode == 1 ? 'selected' : '') + '>Truncate</option><option value="0" ' + (f.mode == 0 ? 'selected' : '') + '>Delete</option></select></td>';
        row += '<td class="align-middle"><button onclick="filters.splice(' + realIdx + ',1);renderFilters()" class="btn btn-sm btn-outline-danger py-1 px-2"><i class="bi bi-trash"></i></button></td>';
        row += '</tr>';
        return row;
      }).join('') || '<tr><td colspan="5" class="py-4 text-muted">No filters.</td></tr>';
      initTooltips();

    const saveEverything = async () => {
      const cfgEl = document.getElementById('cfg-token');
      const relayEl = document.getElementById('cfg-relay-url');
      const relayTokenEl = document.getElementById('cfg-relay-token');
      const configPayload = { token: cfgEl ? cfgEl.value : undefined };
      if (relayEl) configPayload.relay_url = relayEl.value;
      if (relayTokenEl) configPayload.relay_token = relayTokenEl.value;
      const cfgOk = await api('/admin/api/config', 'POST', configPayload);
      if (!cfgOk) { toast('Config 儲存失敗', 'danger'); return; }
      const channelsOk = await api('/admin/api/batch-channels', 'POST', channels);
      if (!channelsOk) { toast('渠道儲存失敗，請檢查連線', 'danger'); return; }
      const validFilters = filters.filter(f => f.text && f.text.trim().length > 0 && f.text.length <= 30);
      if (validFilters.length !== filters.length) {
        toast(`${filters.length - validFilters.length} 個過濾器關鍵字無效（1-30字），已跳過`, 'warning');
      }
      const filterOk = await api('/admin/api/filters', 'POST', validFilters);
      if (!filterOk) { toast('過濾器儲存失敗', 'danger'); return; }
      toast('全部已儲存', 'success');
      // 不呼叫 init() 以免 D1 eventual consistency 覆蓋前端已儲存的最新資料
      renderChannels();
      renderStats();
    };

    const addFilter = () => { filters.push({ text: '', mode: 1, is_enabled: true }); renderFilters(); };

    const addHeaderRow = () => {
      chHeaders.push({ key: '', value: '' });
      renderHeaders();
    };

    const nextChannelId = () => {
      const ids = new Set(channels.map(c => c.id).filter(i => i !== undefined));
      let id = 1; while (ids.has(id)) id++; return id;
    };

    const openChannelModal = () => {
      if (!chModal) { toast('Modal 尚未準備好，請稍候再試', 'danger'); return; }
      document.getElementById('ch-idx').value = '';
      const nextId = nextChannelId();
      document.getElementById('ch-id').value = nextId;
      const badge = document.getElementById('ch-id-badge');
      badge.textContent = 'NEW #' + nextId; badge.style.display = '';
      ['ch-name','ch-key','ch-url','ch-model'].forEach(i => document.getElementById(i).value = '');
      document.getElementById('ch-weight').value = 50;
      chEnabled = true;
      updateEnabledBtn();
      document.getElementById('ch-type').value = 'chat';
      document.getElementById('ch-rpm').value = '0';
      document.getElementById('ch-rpd').value = '0';
      document.getElementById('ch-fallback-model').value = '';
      document.getElementById('ch-prepend-prompt').value = '';
      document.getElementById('ch-support-tools').checked = true;
      document.getElementById('ch-support-vision').checked = false;
      document.getElementById('ch-max-ctx').value = '0';
      updateCapabilities();
      chHeaders = [];
      renderHeaders();
      switchTab('basic');
      chModal.show();
    };

    const editChannel = (idx) => {
      if (!chModal) { toast('Modal 尚未準備好，請稍候再試', 'danger'); return; }
      const c = channels[idx];
      document.getElementById('ch-idx').value = idx;
      document.getElementById('ch-id').value = c.id || '';
      const badge = document.getElementById('ch-id-badge');
      if (c.id) { badge.textContent = '#' + c.id; badge.style.display = ''; }
      else { badge.textContent = ''; badge.style.display = 'none'; }
      document.getElementById('ch-name').value = c.name || '';
      document.getElementById('ch-key').value = c.api_key || '';
      document.getElementById('ch-url').value = (c.base_url || '').replace(/\/+$/, '');
      document.getElementById('ch-model').value = c.model || '';
      document.getElementById('ch-weight').value = c.weight || 50;
      chEnabled = c.is_enabled == 1;
      updateEnabledBtn();
      document.getElementById('ch-type').value = c.channel_type || 'chat';
      document.getElementById('ch-rpm').value = c.rpm_limit || 0;
      document.getElementById('ch-rpd').value = c.rpd_limit || 0;
      document.getElementById('ch-fallback-model').value = c.fallback_model || '';
      let prependText = '';
      if (c.provider_options) {
        try {
          const popts = typeof c.provider_options === "string" ? JSON.parse(c.provider_options) : c.provider_options;
          const pms = popts?.rewrite?.request?.body?._prepend_messages;
          if (Array.isArray(pms) && pms.length > 0 && pms[0].content) prependText = pms[0].content;
        } catch (e) {}
      }
      document.getElementById('ch-prepend-prompt').value = prependText;
      document.getElementById('ch-support-tools').checked = c.support_tools == 1;
      document.getElementById('ch-support-vision').checked = c.support_vision == 1;

      document.getElementById('ch-max-ctx').value = +c.max_context_length || 0;
      updateCapabilities();
      chHeaders = Array.isArray(c.headers) ? c.headers.map(h => ({ key: h.key || '', value: h.value || '' })) : [];
      renderHeaders();
      switchTab('basic');
      chModal.show();
    };

    const applyChannel = () => {
      if (document.activeElement) document.activeElement.blur();
      const idx = document.getElementById('ch-idx').value;
      const name = document.getElementById('ch-name').value.trim();
      if (!name) return toast('請輸入名稱', 'warning');
      const weight = parseInt(document.getElementById('ch-weight').value);
      if (isNaN(weight) || weight < 1 || weight > 1000) return toast('Weight 需介於 1-1000', 'warning');
      const model = document.getElementById('ch-model').value.trim();
      if (!model) return toast('請輸入 Model', 'warning');
      const url = document.getElementById('ch-url').value.trim().replace(/\/+$/, '');
      if (!url) return toast('請輸入 Base URL', 'warning');

      const idVal = document.getElementById('ch-id').value;
      const rpmLimit = parseInt(document.getElementById('ch-rpm')?.value) || 0;
      const rpdLimit = parseInt(document.getElementById('ch-rpd')?.value) || 0;
      const fallbackModel = document.getElementById('ch-fallback-model')?.value?.trim() || '';
      let providerOptions = null;
      const prependText = document.getElementById('ch-prepend-prompt')?.value?.trim();
      // 保留現有 provider_options 中非 _prepend_messages 的欄位（如 model_map）
      // 注意：D1 預設值 '[]' 經 JSON.parse 後變空陣列，物件 key 會因 JSON.stringify 遺失
      const rawPO = (idx !== '' && channels[parseInt(idx)]?.provider_options) || null;
      const existingPO = (rawPO && Array.isArray(rawPO) && rawPO.length === 0) ? null : rawPO;
      if (existingPO || prependText) {
        const merged = existingPO ? (typeof existingPO === "string" ? JSON.parse(existingPO) : JSON.parse(JSON.stringify(existingPO))) : {};
        if (!merged.rewrite) merged.rewrite = {};
        if (!merged.rewrite.request) merged.rewrite.request = {};
        if (!merged.rewrite.request.body) merged.rewrite.request.body = {};
        if (prependText) {
          merged.rewrite.request.body._prepend_messages = [{ role: "system", content: prependText }];
        } else {
          delete merged.rewrite.request.body._prepend_messages;
        }
        // 清理空物件
        if (Object.keys(merged.rewrite.request.body).length === 0) delete merged.rewrite.request.body;
        if (Object.keys(merged.rewrite.request).length === 0) delete merged.rewrite.request;
        if (Object.keys(merged.rewrite).length === 0) delete merged.rewrite;
        providerOptions = Object.keys(merged).length ? merged : null;
      }
      const ch = {
        id: idVal ? parseInt(idVal) : undefined,
        name,
        api_key: document.getElementById('ch-key').value,
        base_url: url,
        model,
        weight,
        is_enabled: chEnabled ? 1 : 0,
        stream_type: 'both',
        channel_type: document.getElementById('ch-type').value,
        headers: chHeaders.filter(h => h.key && h.key.trim()),
        rpm_limit: rpmLimit,
        rpd_limit: rpdLimit,
        fallback_model: fallbackModel,
        provider_options: providerOptions,
        support_tools: document.getElementById('ch-support-tools').checked ? 1 : 0,
        support_vision: document.getElementById('ch-support-vision').checked ? 1 : 0,

        max_context_length: parseInt(document.getElementById('ch-max-ctx')?.value) || 0,
      };
      if (idx !== '') channels[parseInt(idx)] = ch;
      else channels.push(ch);
      if (chModal) chModal.hide();
      renderChannels();
      renderStats();
      toast(idx !== '' ? '已修改，請 SAVE 儲存' : '已新增，請 SAVE 儲存', 'success');
    };

    const delChannel = (idx) => {
      confirmAction('確定刪除此渠道？', () => {
        channels.splice(idx, 1);
        renderChannels();
        renderStats();
      });
    };

    const copyChannel = (idx) => {
      const src = channels[idx];
      const nextId = nextChannelId();
      channels.push({
        ...src,
        name: src.name + ' (copy)',
        id: nextId,
      });
      renderChannels();
      renderStats();
    };

    const exportChannels = async () => {
      const full = await api('/admin/api/export', 'GET', null, true);
      if (!full) return toast('匯出失敗', 'danger');
      const data = { version: 1, channels: full.channels, filters: full.filters, config: full.config };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'api-gateway-full-backup.json';
      a.click();
      URL.revokeObjectURL(url);
      toast('已匯出 ' + (full.channels?.length || 0) + ' 個渠道（含 API Key）', 'success');
    };

    const importChannels = () => {
      const input = document.createElement('input');
      input.type = 'file'; input.accept = '.json';
      input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 5 * 1024 * 1024) return toast('檔案過大（最大 5MB）', 'danger');
        try {
          const text = await file.text();
          const data = JSON.parse(text);
          const arr = data?.channels || data;
          if (!Array.isArray(arr)) throw new Error('格式錯誤：缺少 channels 陣列');
          const validStreamTypes = ['both', 'stream', 'nonstream'];
          const validChannelTypes = ['chat','image_gen','image_edit','tts','stt','embed','moderate','assistant','fine_tune','file','responses','batches','models','realtime'];
          for (const ch of arr) {
            if (!ch.name || !ch.base_url || !ch.model) throw new Error('缺少必要欄位 (name, base_url, model)');
            if (ch.stream_type && !validStreamTypes.includes(ch.stream_type)) throw new Error('無效的 stream_type: ' + ch.stream_type);
            if (ch.channel_type && !validChannelTypes.includes(ch.channel_type)) throw new Error('無效的 channel_type: ' + ch.channel_type);
          }
          const maxExistingId = arr.reduce((max, ch) => ch.id != null ? Math.max(max, ch.id) : max, 0);
          let nextId = maxExistingId + 1;
          const newChannels = arr.map(ch => ({
            id: (ch.id != null && ch.id !== 0) ? ch.id : nextId++,
            api_key: ch.api_key || '',
            name: ch.name,
            base_url: ch.base_url,
            model: ch.model,
            weight: ch.weight || 50,
            is_enabled: ch.is_enabled != null ? (ch.is_enabled ? 1 : 0) : 1,
            stream_type: ch.stream_type || 'both',
            channel_type: ch.channel_type || 'chat',
            headers: Array.isArray(ch.headers) ? ch.headers.filter(h => h.key) : [],
            rpm_limit: ch.rpm_limit || 0,
            rpd_limit: ch.rpd_limit || 0,
            fallback_model: ch.fallback_model || '',
            provider_options: ch.provider_options || null,
            support_tools: ch.support_tools != null ? ch.support_tools : 1,
            support_vision: ch.support_vision != null ? ch.support_vision : 0,
            provider: ch.provider || '',
            max_tokens: ch.max_tokens || 0,
            support_stream: ch.support_stream != null ? (ch.support_stream ? 1 : 0) : 1,
            support_image_gen: ch.support_image_gen != null ? (ch.support_image_gen ? 1 : 0) : 0,
            support_audio_tts: ch.support_audio_tts != null ? (ch.support_audio_tts ? 1 : 0) : 0,
            support_audio_stt: ch.support_audio_stt != null ? (ch.support_audio_stt ? 1 : 0) : 0,
            support_image_edit: ch.support_image_edit != null ? (ch.support_image_edit ? 1 : 0) : 0,
            support_embeddings: ch.support_embeddings != null ? (ch.support_embeddings ? 1 : 0) : 0,
            absolute_url: ch.absolute_url ? 1 : 0,
            response_time: ch.response_time || 0,
            max_context_length: +ch.max_context_length || 0,

          }));
          channels.splice(0, channels.length, ...newChannels);
          let importedFilters = false;
          if (Array.isArray(data.filters)) {
            filters.splice(0, filters.length, ...data.filters.map(f => ({
              id: f.id, text: f.text, mode: f.mode != null ? f.mode : 1, is_enabled: f.is_enabled != null ? f.is_enabled : 1,
            })));
            importedFilters = true;
          }
          // 自動存檔到 D1（避免重整頁面後資料遺失）
          loading(true);
          try {
            const chOk = await api('/admin/api/batch-channels', 'POST', channels, false);
            if (!chOk) { toast('渠道儲存失敗', 'danger'); return; }
            if (importedFilters) {
              const validFilters = filters.filter(f => f.text && f.text.trim().length > 0 && f.text.length <= 30);
              const flOk = await api('/admin/api/filters', 'POST', validFilters, false);
              if (!flOk) { toast('過濾器儲存失敗', 'danger'); return; }
            }
            const cfgPayload = {};
            if (data.config?.relay_url != null) {
              const rl = document.getElementById('cfg-relay-url');
              if (rl) rl.value = data.config.relay_url;
              cfgPayload.relay_url = data.config.relay_url;
            }
            if (data.config?.relay_token != null) {
              const rt = document.getElementById('cfg-relay-token');
              if (rt) rt.value = data.config.relay_token;
              cfgPayload.relay_token = data.config.relay_token;
            }
            if (Object.keys(cfgPayload).length > 0) {
              await api('/admin/api/config', 'POST', cfgPayload, false);
            }
          } finally {
            loading(false);
          }
          renderChannels();
          renderFilters();
          renderStats();
          toast('已匯入 ' + channels.length + ' 個渠道' + (importedFilters ? ' + ' + filters.length + ' 過濾器' : '') + '，已自動存檔', 'success');
        } catch (err) {
          toast('匯入失敗: ' + err.message, 'danger');
        }
      };
      input.click();
    };

    const toggleKeyVis = () => {
      const i = document.getElementById('ch-key');
      i.classList.toggle('pwd-mask');
    };

    const toggleSort = (key) => {
      if (sortKey === key) {
        sortOrder = (sortOrder + 1) % 3;
        if (sortOrder === 0) sortKey = null;
      } else {
        sortKey = key; sortOrder = 1;
      }
      renderChannels();
    };

    const toggleAllChannels = (val) => {
      const query = document.getElementById('ch-search').value.toLowerCase();
      const target = query ? channels.filter(c =>
        (c.name || '').toLowerCase().includes(query) ||
        (c.model || '').toLowerCase().includes(query)
      ) : channels;
      if (target.length === 0) return toast('沒有符合的渠道', 'warning');
      target.forEach(c => c.is_enabled = val);
      renderChannels();
      renderStats();
      toast((query ? '搜尋範圍 ' : '全部 ') + target.length + ' 個渠道已' + (val ? '啟用' : '停用') + '，請存檔生效', 'info');
    };
    const toggleAllFilters = (val) => {
      const query = document.getElementById('fl-search')?.value?.toLowerCase() || '';
      const target = query ? filters.filter(f =>
        (f.text || '').toLowerCase().includes(query)
      ) : filters;
      if (target.length === 0) return toast('沒有符合的過濾器', 'warning');
      target.forEach(f => f.is_enabled = val);
      renderFilters();
      toast((query ? '搜尋範圍 ' : '全部 ') + target.length + ' 個過濾器已' + (val ? '啟用' : '停用') + '，請存檔生效', 'info');
    };

    const resetSystem = async () => {
      confirmAction('重置系統將清除所有頻道、過濾器與設定（不含密碼），確定？', async () => {
        await api('/admin/api/reset', 'POST');
        location.reload();
      });
    };

    const checkAuth = async () => {
      loading(true);
      const ac = new AbortController();
      const to = setTimeout(() => ac.abort(), 8000);
      try {
        const authRes = await fetch('/admin/api/auth-status', { signal: ac.signal });
        clearTimeout(to);
        const authData = await authRes.json();
        if (authData.needsSetup) { showSetup(); return; }

        const storedToken = sessionStorage.getItem('adminToken');
        if (storedToken) {
          const r = await fetch('/admin/api/verify-token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: storedToken }),
          });
          const data = await r.json();
          if (data.valid) {
            sessionStorage.setItem('adminLoggedIn', '1');
            if (data.sessionToken) sessionStorage.setItem('adminToken', data.sessionToken);
            await showAdmin();
            loading(false);
          } else {
            sessionStorage.removeItem('adminToken');
            sessionStorage.removeItem('adminLoggedIn');
            showLogin();
          }
        } else {
          showLogin();
        }
      } catch (e) {
        clearTimeout(to);
        showLogin();
      }
    };

    let loaded = false;
    const forceShow = () => {
      if (loaded) return;
      loaded = true;
      const el = document.getElementById('loading-overlay');
      if (el) el.classList.add('hide');
      document.body.classList.remove('loading');
    };
    setTimeout(forceShow, 60000);

    window.onload = () => {
      try {
        const theme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', theme);
        document.getElementById('theme-icon').className = theme === 'dark' ? 'bi bi-moon-fill' : 'bi bi-sun';
        try {
          chModal = new bootstrap.Modal(document.getElementById('chModal'), { backdrop: 'static' });
          passModal = new bootstrap.Modal(document.getElementById('passModal'), { backdrop: 'static' });
          document.querySelectorAll('.modal').forEach(el => {
            el.addEventListener('hide.bs.modal', () => { if (document.activeElement?.closest('.modal')) document.activeElement?.blur(); });
          });
        } catch (e) { console.warn('[modal]', e); }
        const goTopBtn = document.getElementById('go-top-btn');
        if (goTopBtn) {
          const updateGoTop = () => {
            goTopBtn.style.display = (!document.body.classList.contains('modal-open') && window.scrollY > 200) ? 'block' : 'none';
          };
          window.addEventListener('scroll', updateGoTop);
        }
        // 點擊 model 名稱複製（event delegation，避免 inline onclick XSS）
        document.getElementById('channel-list')?.addEventListener('click', (e) => {
          const code = e.target.closest('.copy-model');
          if (code) { const m = code.dataset.model; if (m) copyModelName(m); }
        });
      } catch (e) { console.error('[init]', e); }
      checkAuth();
    };
  </script>
</body>
</html>
