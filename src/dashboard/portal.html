<!DOCTYPE html>
<html lang="zh-TW" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <title>API Gateway</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxNiIgaGVpZ2h0PSIxNiIgZmlsbD0iI0ZGQzEwNyIgdmlld0JveD0iMCAwIDE2IDE2Ij48cGF0aCBkPSJNMTEuMjUxLjA2OGEuNS41IDAgMCAxIC4yMjcuNThMOS42NzcgNi41SDEzYS41LjUgMCAwIDEgLjM2NC44NDNsLTggOC41YS41LjUgMCAwIDEtLjg0Mi0uNDlMNS45OSA5LjVIM2EuNS41IDAgMCAxLS4zNzItLjgzNGw4LTguNWEuNS41IDAgMCAxIC40MjMtLjE5OHoiLz48L3N2Zz4=">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" crossorigin="anonymous" />
  <link href="https://cdn.jsdelivr.net/npm/notyf@3.10.0/notyf.min.css" rel="stylesheet" crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root { --bs-body-font-family: 'Outfit', system-ui, -apple-system, sans-serif; }
    body { background: var(--bs-tertiary-bg); transition: background-color 0.2s, color 0.2s; min-height: 100vh; }
    #login-view, #setup-view, #admin-view { display: none; }
    .navbar { backdrop-filter: blur(10px); background: rgba(var(--bs-body-bg-rgb), 0.8) !important; }
    .form-switch .form-check-input { cursor: pointer; margin-top: 0; }
    .form-check { min-height: auto; padding-top: 0; padding-bottom: 0; }
    .table td, .table th { vertical-align: middle; padding: 0.5rem; }
    .badge { font-weight: 600; letter-spacing: 0.5px; }
    .health-badge { cursor: help; }
    #loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
    #loading-overlay.hide { display: none; }
    .notyf { z-index: 10000 !important; }
    .stat-card { border-start: 4px solid var(--bs-primary); }
    .table-responsive { border-radius: 0.75rem; overflow: hidden; }
    @media (max-width: 576px) {
      .navbar-brand { font-size: 1rem; }
      .btn-sm { padding: 0.25rem 0.5rem; font-size: 0.75rem; }
      .card-header span { font-size: 0.85rem; }
      .input-group-text { font-size: 0.7rem; }
    }
    #loading-overlay .spinner-border { display: inline-block; width: 2rem; height: 2rem; border: 0.25em solid #fff; border-right-color: transparent; border-radius: 50%; animation: ldsp 0.75s linear infinite; }
    @keyframes ldsp { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading-overlay"><div class="spinner-border text-light" role="status"></div></div>
  <script>
  setTimeout(function(){
    var e=document.getElementById('loading-overlay');
    if(e)e.classList.add('hide');
    document.body.classList.remove('loading');
    var l=document.getElementById('login-view'),s=document.getElementById('setup-view'),a=document.getElementById('admin-view');
    if(l&&s&&a&&l.style.display!=='block'&&s.style.display!=='block'&&a.style.display!=='block'){
      l.style.display='block';
      document.getElementById('login-pass')?.focus();
    }
  },15000);
  </script>

  <div id="login-view" class="container py-5 mt-5">
    <div class="row justify-content-center pt-5"><div class="col-md-4"><div class="card p-4"><div class="card-body text-center">
      <h4 class="fw-bold mb-4">API Gateway</h4>
      <form id="loginForm">
        <div class="mb-4 text-start">
          <label class="form-label small fw-bold">ADMIN PASSWORD</label>
          <input type="password" id="login-pass" class="form-control" minLength="6" maxLength="20" required />
        </div>
        <button type="submit" class="btn btn-primary w-100 fw-bold py-2">LOGIN</button>
      </form>
    </div></div></div></div>
  </div>

  <div id="setup-view" class="container py-5 mt-5">
    <div class="row justify-content-center pt-5"><div class="col-md-4"><div class="card p-4"><div class="card-body text-center">
      <h4 class="fw-bold mb-4">API Gateway</h4>
      <p class="text-muted small mb-3">請設定管理員密碼</p>
      <form id="setupForm">
        <div class="mb-4 text-start">
          <label class="form-label small fw-bold">NEW PASSWORD</label>
          <input type="password" id="setup-pass" class="form-control" minLength="6" maxLength="20" required />
        </div>
        <button type="submit" class="btn btn-success w-100 fw-bold py-2">SET PASSWORD</button>
      </form>
    </div></div></div></div>
  </div>

  <div id="admin-view">
    <nav class="navbar navbar-expand border-bottom sticky-top mb-4 py-2">
      <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="javascript:location.reload()">API Gateway</a>
        <div class="ms-auto d-flex gap-2 align-items-center">
          <button onclick="saveEverything()" class="btn btn-sm btn-primary fw-bold px-3">SAVE ALL</button>
          <div class="dropdown">
            <button class="btn btn-sm btn-outline-secondary dropdown-toggle fw-bold" data-bs-toggle="dropdown">TOOLS</button>
            <ul class="dropdown-menu dropdown-menu-end shadow border-0">
              <li><button class="dropdown-item py-2 small" onclick="passModal.show()"><i class="bi bi-shield-lock me-2"></i>Change PW</button></li>
              <li><button class="dropdown-item py-2 small" onclick="exportJson()"><i class="bi bi-download me-2"></i>Export JSON</button></li>
              <li><label class="dropdown-item py-2 small mb-0" style="cursor:pointer"><i class="bi bi-upload me-2"></i>Import JSON<input type="file" onchange="importJson(event)" style="display:none" /></label></li>
              <li><hr class="dropdown-divider"></li>
              <li><button class="dropdown-item py-2 small text-danger" onclick="resetSystem()"><i class="bi bi-arrow-counterclockwise me-2"></i>System Reset</button></li>
            </ul>
          </div>
          <a href="https://github.com/ss-vip/api-gateway" target="_blank" class="btn btn-sm btn-outline-secondary border-0 px-2" title="GitHub Project"><i class="bi bi-github"></i></a>
          <button onclick="toggleTheme()" class="btn btn-sm btn-outline-secondary border-0 px-2"><i id="theme-icon" class="bi bi-sun"></i></button>
          <button onclick="logout()" class="btn btn-sm btn-outline-danger border-0 px-2" title="LOGOUT"><i class="bi bi-box-arrow-right"></i></button>
        </div>
      </div>
    </nav>

    <div class="container pb-5">
      <div class="d-flex justify-content-between align-items-center mb-3 mt-2">
        <h5 class="fw-bold mb-0 text-uppercase text-secondary" style="font-size: 0.9rem; letter-spacing: 1px;">System Status</h5>
      </div>
      <div id="stat-content" class="mb-4"></div>

      <div class="card border-0 shadow-sm mb-4">
        <div class="card-header bg-transparent d-flex justify-content-between align-items-center py-3 border-0">
          <span class="text-muted small fw-bold text-uppercase">API Configuration</span>
          <button onclick="saveConfig()" class="btn btn-primary btn-sm px-3 fw-bold">SAVE</button>
        </div>
        <div class="card-body pt-0">
          <div class="row g-2">
            <div class="col-md-8">
              <div class="input-group input-group-sm">
                <span class="input-group-text fw-bold small">TOKEN</span>
                <input type="text" id="cfg-token" class="form-control" />
                <button class="btn btn-outline-secondary" onclick="copyToken()"><i class="bi bi-copy"></i></button>
              </div>
            </div>
            <div class="col-md-4">
              <div class="input-group input-group-sm">
                <span class="input-group-text fw-bold small">Recovery Delay (s)</span>
                <input type="number" id="cfg-recovery-period" class="form-control" />
              </div>
            </div>
          </div>

        </div>
      </div>

      <div class="card mb-4 border-0 shadow-sm">
        <div class="card-header bg-transparent fw-bold d-flex justify-content-between align-items-center py-3 border-0">
          <div class="d-flex align-items-center gap-3 flex-grow-1">
            <span class="d-none d-md-inline">Channels</span>
            <div class="input-group input-group-sm" style="max-width: 250px;">
              <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-search"></i></span>
              <input type="text" id="ch-search" class="form-control border-start-0 ps-0" placeholder="Search..." oninput="renderChannels()" />
            </div>
          </div>
          <div class="d-flex gap-2">
            <button onclick="openChannelModal()" class="btn btn-outline-primary btn-sm px-3 fw-bold">ADD</button>
            <button onclick="resetAllHealth()" class="btn btn-outline-success btn-sm px-3 fw-bold">RESET ALL HEALTH</button>
            <button onclick="saveAllChannels()" class="btn btn-primary btn-sm px-3 fw-bold">SAVE</button>
          </div>
        </div>
        <div class="table-responsive">
          <table class="table table-hover mb-0 text-center align-middle small text-nowrap">
            <thead class="table-light">
              <tr class="text-uppercase text-muted small" style="letter-spacing: 0.5px;">
                <th style="width: 60px" class="border-0 cursor-pointer" onclick="toggleSort('id')">ID <i id="sort-id" class="bi bi-arrow-down-up opacity-25"></i></th>
                <th style="width: 110px" class="border-0">
                  <div class="d-flex align-items-center">
                    <input type="checkbox" class="form-check-input me-2" id="master-toggle" title="全選/全取消" onclick="toggleAllChannels(this.checked)">
                    <span class="cursor-pointer" onclick="toggleSort('is_enabled')">ON/OFF <i id="sort-is_enabled" class="bi bi-arrow-down-up opacity-25"></i></span>
                  </div>
                </th>
                <th class="border-0 cursor-pointer" onclick="toggleSort('name')">Name <i id="sort-name" class="bi bi-arrow-down-up opacity-25"></i></th>
                <th class="border-0 cursor-pointer" onclick="toggleSort('model')">Model <i class="bi bi-info-circle" title="優先調用相符的模型名、視覺、工具使用"></i> <i id="sort-model" class="bi bi-arrow-down-up opacity-25"></i></th>
                <th style="width: 100px" class="d-none d-sm-table-cell border-0 cursor-pointer" onclick="toggleSort('weight')">Weight <i class="bi bi-arrow-down-up opacity-25"></i></th>
                <th style="width: 100px" class="d-none d-sm-table-cell border-0 cursor-pointer" onclick="toggleSort('response_time')">Latency <i id="sort-response_time" class="bi bi-arrow-down-up opacity-25"></i></th>
                <th style="width: 120px" class="border-0 cursor-pointer" onclick="toggleSort('status')">Health <i id="sort-status" class="bi bi-arrow-down-up opacity-25"></i></th>
                <th style="width: 150px" class="text-center border-0">Actions</th>
              </tr>
            </thead>
            <tbody id="channel-list"></tbody>
          </table>
        </div>
      </div>

      <div class="card border-0 shadow-sm">
        <div class="card-header bg-transparent fw-bold d-flex justify-content-between align-items-center py-3 border-0">
          <span>Filters</span>
          <div class="d-flex gap-2">
            <button onclick="addFilter()" class="btn btn-outline-info btn-sm px-3 fw-bold">ADD</button>
            <button onclick="saveAllFilters()" class="btn btn-primary btn-sm px-3 fw-bold">SAVE</button>
          </div>
        </div>
        <div class="table-responsive">
          <table class="table table-hover mb-0 text-center small">
            <thead class="table-light">
              <tr>
                <th style="width: 80px" class="align-middle">ON/OFF</th>
                <th class="align-middle">Keyword <i class="bi bi-info-circle" title="要過濾的關鍵字"></i></th>
                <th style="width: 120px" class="d-none d-sm-table-cell align-middle">Mode <i class="bi bi-info-circle" title="Truncate: 切除關鍵字及其後內容；Delete: 僅刪除關鍵字"></i></th>
                <th style="width: 60px" class="align-middle">Actions</th>
              </tr>
            </thead>
            <tbody id="filter-list"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <button id="go-top-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})" class="btn btn-primary position-fixed bottom-0 end-0 m-3 rounded-circle p-2" style="width:40px;height:40px;z-index:1060;display:none;" title="Go Top" tabindex="-1"><i class="bi bi-arrow-up"></i></button>

  <div class="modal fade" id="passModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered modal-sm"><div class="modal-content">
    <div class="modal-header border-0 pb-0"><h5 class="fw-bold">New Login Password</h5><button type="button" class="btn-close ms-auto" data-bs-dismiss="modal" aria-label="Close"></button></div>
    <div class="modal-body p-4"><input type="password" id="new-admin-pass" class="form-control" placeholder="New Password" minLength="6" maxLength="20" required /></div>
    <div class="modal-footer border-0 pt-0"><button onclick="updateAdminPass()" class="btn btn-warning w-100 fw-bold">UPDATE & LOGOUT</button></div>
  </div></div></div>

  <div class="modal fade" id="chModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content">
    <div class="modal-header border-0 pb-0">
      <div class="d-flex align-items-center gap-2">
        <h5 class="fw-bold small mb-0">Channel Editor</h5>
        <span id="ch-id-badge" class="badge bg-secondary" style="display:none"></span>
      </div>
      <button type="button" class="btn-close ms-auto" data-bs-dismiss="modal" aria-label="Close"></button>
    </div>
    <form id="ch-form" onsubmit="event.preventDefault(); applyChannel();">
    <div class="modal-body p-3 p-md-4">
      <input type="hidden" id="ch-idx" />
      <input type="hidden" id="ch-id" />
      <div class="mb-2"><label class="form-label mini-label fw-bold">Name *</label><input type="text" id="ch-name" class="form-control form-control-sm" required /></div>
      <div class="mb-2">
        <label class="form-label mini-label fw-bold">API Key *</label>
        <div class="input-group input-group-sm">
          <input type="password" id="ch-key" class="form-control form-control-sm" required />
          <button class="btn btn-outline-secondary" type="button" onclick="toggleKeyVis()" title="Toggle visibility">&#128065;</button>
        </div>
      </div>
      <div class="mb-2"><label class="form-label mini-label fw-bold">Base URL * <span class="text-muted fw-normal" style="font-size:0.6rem">建議結尾包含 /v1</span></label><input type="url" id="ch-url" class="form-control form-control-sm" placeholder="https://api.example.com/v1" oninput="checkFetchModelsBtn()" required /></div>
      <div class="mb-2">
        <label class="form-label mini-label fw-bold">Primary Model *</label>
        <div class="input-group input-group-sm">
          <input type="text" id="ch-model" class="form-control form-control-sm" required />
          <button class="btn btn-outline-secondary" type="button" onclick="clearInput('ch-model')" title="Clear"><i class="bi bi-x-lg"></i></button>
          <button class="btn btn-outline-primary fw-bold" type="button" id="btn-fetch-models-primary" onclick="fetchModels('primary')" disabled>FETCH</button>
        </div>
      </div>
      <div class="mb-2">
        <label class="form-label mini-label fw-bold">Secondary Model <span class="text-muted fw-normal" style="font-size:0.6rem">Fallback, Optional</span></label>
        <div class="input-group input-group-sm">
          <input type="text" id="ch-fallback-model" class="form-control form-control-sm" />
          <button class="btn btn-outline-secondary" type="button" onclick="clearInput('ch-fallback-model')" title="Clear"><i class="bi bi-x-lg"></i></button>
          <button class="btn btn-outline-secondary fw-bold" type="button" id="btn-fetch-models-fallback" onclick="fetchModels('fallback')" disabled>FETCH</button>
        </div>
      </div>
      <div class="row g-2 mb-2">
        <div class="col-6"><label class="form-label mini-label fw-bold">Weight (1-100)</label><input type="number" id="ch-weight" class="form-control form-control-sm" min="1" max="100" value="50" required /></div>
        <div class="col-6"><label class="form-label mini-label fw-bold">Max Tokens</label><input type="number" id="ch-tokens" class="form-control form-control-sm" min="0" value="0" /></div>
      </div>
      <div class="row g-1 mb-2">
        <div class="col-6"><label class="form-label mini-label fw-bold">RPM</label><input type="number" id="ch-rpm" class="form-control form-control-sm p-1" min="0" value="0" /></div>
        <div class="col-6"><label class="form-label mini-label fw-bold">RPD</label><input type="number" id="ch-rpd" class="form-control form-control-sm p-1" min="0" value="0" /></div>
      </div>
      <div class="row g-2 mt-3 pt-2 border-top">
        <div class="col-4 d-flex flex-column align-items-center">
          <label class="form-check-label small fw-bold mb-1" for="ch-vision">&#x1F441;&#xFE0F; Vision</label>
          <div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="ch-vision" checked></div>
        </div>
        <div class="col-4 d-flex flex-column align-items-center">
          <label class="form-check-label small fw-bold mb-1" for="ch-tools">&#x1F527; Tools</label>
          <div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="ch-tools" checked></div>
        </div>
        <div class="col-4 d-flex flex-column align-items-center">
          <label class="form-check-label small fw-bold mb-1" for="ch-enabled">&#x2714;&#xFE0F; Enabled</label>
          <div class="form-check form-switch"><input class="form-check-input" type="checkbox" id="ch-enabled" checked></div>
        </div>
      </div>
    </div>
    <div class="modal-footer border-0 pt-0"><button type="submit" class="btn btn-primary w-100 fw-bold">APPLY</button></div>
    </form>
  </div></div></div>

  <div class="modal fade" id="debugModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered modal-lg"><div class="modal-content">
    <div class="modal-header border-0 pb-0">
      <h5 class="fw-bold small mb-0">Debug Info (Last Error)</h5>
      <button type="button" class="btn-close ms-auto" data-bs-dismiss="modal" aria-label="Close"></button>
    </div>
    <div class="modal-body p-3 p-md-4">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <span id="debug-time" class="text-muted fw-bold" style="font-size:0.8rem"></span>
      </div>
      <div class="mb-2"><label class="form-label mini-label">Error Message</label><input type="text" id="debug-msg" class="form-control form-control-sm text-danger" readonly /></div>
      <div class="mb-2" id="debug-url-wrapper"><label class="form-label mini-label">Target URL</label><input type="text" id="debug-url" class="form-control form-control-sm" readonly /></div>
      <div class="row g-2" id="debug-req-res-wrapper">
        <div class="col-12"><label class="form-label mini-label">Request Payload</label><textarea id="debug-req" class="form-control form-control-sm" rows="5" readonly style="font-size:0.7rem"></textarea></div>
        <div class="col-12"><label class="form-label mini-label">Response Data</label><textarea id="debug-res" class="form-control form-control-sm" rows="5" readonly style="font-size:0.7rem"></textarea></div>
      </div>
    </div>
  </div></div></div>

  <div class="modal fade" id="modelsModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content">
    <div class="modal-header border-0 pb-0"><h5 class="fw-bold small mb-0">Select a Model</h5><button type="button" class="btn-close ms-auto" data-bs-dismiss="modal" aria-label="Close"></button></div>
    <div class="modal-body p-3">
      <input type="text" id="model-search" class="form-control form-control-sm mb-2" placeholder="Search models..." oninput="renderModelList()" />
      <div class="list-group list-group-flush" id="models-list" style="max-height: 300px; overflow-y: auto;"></div>
    </div>
  </div></div></div>

  <style>.mini-label { font-size: 0.65rem; margin-bottom: 2px; text-transform: uppercase; color: var(--bs-secondary); }</style>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/notyf@3.10.0/notyf.min.js" crossorigin="anonymous"></script>
  <script>
    let _notyf = null;
    const getNotyf = () => {
      if (!_notyf && typeof Notyf !== 'undefined') {
        _notyf = new Notyf({ position: { x: 'right', y: 'bottom' }, ripple: true, dismissible: true, duration: 2500 });
      }
      return _notyf;
    };
    const toast = (msg, type) => {
      const n = getNotyf();
      if (!n) { alert(msg); return; }
      if (type === 'danger') n.error(msg); else n.success(msg);
    };
    const confirmAction = (msg, onOk) => { if (window.confirm(msg)) onOk(); };

    let chModal, passModal, debugModal, modelsModal;
    let channels = [], filters = [], delay_period = 300;
    let refreshTimer = null, lastChannelsStr = '';
    let sortKey = null, sortOrder = 0;
    let pendingRequests = 0;

    const dismissAllModals = () => {
      [chModal, passModal, debugModal, modelsModal].forEach(m => { if (m) m.hide(); });
    };

    const loading = (show) => {
      const el = document.getElementById('loading-overlay');
      if (show) {
        pendingRequests++;
        el.classList.remove('hide');
        setTimeout(() => { if (pendingRequests > 0) { pendingRequests = 0; el.classList.add('hide'); } }, 10000);
      } else {
        pendingRequests = Math.max(0, pendingRequests - 1);
        if (pendingRequests === 0) el.classList.add('hide');
      }
    };

    const api = async (u, m='GET', b=null, showLoader=true) => {
      if (showLoader) loading(true);
      try {
        const r = await fetch(u, {
          method: m,
          headers: {
            'Content-Type': 'application/json',
            'X-Admin-Token': sessionStorage.getItem('adminToken') || '',
          },
          body: b ? JSON.stringify(b) : null,
        });
        if (r.status === 401) {
          dismissAllModals();
          toast('登入階段已過期，請重新登入', 'warning');
          showLogin();
          return null;
        }
        if (!r.ok) {
          const err = await r.json().catch(() => ({}));
          toast(err.error || 'Request Failed', 'danger');
          return null;
        }
        return await r.json();
      } catch (e) {
        toast('Network error: ' + e.message, 'danger');
        return null;
      } finally {
        if (showLoader) loading(false);
      }
    };

    const showLogin = () => {
      document.getElementById('admin-view').style.display = 'none';
      document.getElementById('setup-view').style.display = 'none';
      document.getElementById('login-view').style.display = 'block';
      loading(false);
    };
    const showSetup = () => {
      document.getElementById('admin-view').style.display = 'none';
      document.getElementById('login-view').style.display = 'none';
      document.getElementById('setup-view').style.display = 'block';
      loading(false);
    };
    const showAdmin = () => {
      document.getElementById('login-view').style.display = 'none';
      document.getElementById('setup-view').style.display = 'none';
      document.getElementById('admin-view').style.display = 'block';
      init();
      loading(false);
    };
    const logout = () => {
      sessionStorage.removeItem('adminToken');
      sessionStorage.removeItem('adminLoggedIn');
      location.reload();
    };
    const toggleTheme = () => {
      const t = document.documentElement.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-bs-theme', t);
      document.getElementById('theme-icon').className = t === 'dark' ? 'bi bi-moon-fill' : 'bi bi-sun';
      localStorage.setItem('theme', t);
    };
    const copyToken = () => {
      const t = document.getElementById('cfg-token');
      navigator.clipboard.writeText(t.value)
        .then(() => toast('Token 已複製', 'success'))
        .catch(() => { t.select(); document.execCommand('copy'); toast('Token 已複製', 'success'); });
    };

    const esc = (s) => {
      const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#x27;' };
      return String(s || '').replace(/[&<>"']/g, ch => map[ch] || '');
    };
    const initTooltips = () => {
      document.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(el => new bootstrap.Tooltip(el));
    };

    document.getElementById('loginForm').onsubmit = async (e) => {
      e.preventDefault();
      const p = document.getElementById('login-pass').value;
      if (!p) return toast('請輸入密碼', 'warning');
      loading(true);
      try {
        const r = await fetch('/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: p }),
        });
        const data = await r.json();
        loading(false);
        if (r.ok) {
          sessionStorage.setItem('adminToken', p);
          sessionStorage.setItem('adminLoggedIn', '1');
          showAdmin();
        } else {
          toast(data.error || '密碼錯誤', 'danger');
        }
      } catch (err) {
        loading(false);
        toast('網絡或資料庫異常，請確保已執行 D1 初始化', 'danger');
      }
    };

    document.getElementById('setupForm').onsubmit = async (e) => {
      e.preventDefault();
      const p = document.getElementById('setup-pass').value;
      if (!p) return toast('請輸入密碼', 'warning');
      if (p.length < 6 || p.length > 20) return toast('密碼需 6-20 個字', 'warning');
      loading(true);
      try {
        const r = await fetch('/admin/api/admin-pass', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pass: p }),
        });
        if (!r.ok) {
          loading(false);
          const err = await r.json();
          toast(err.error || '設定失敗', 'danger');
          return;
        }
        const loginRes = await fetch('/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: p }),
        });
        loading(false);
        if (loginRes.ok) {
          sessionStorage.setItem('adminToken', p);
          sessionStorage.setItem('adminLoggedIn', '1');
          showAdmin();
        } else {
          showLogin();
        }
      } catch (err) {
        loading(false);
        toast('網絡或資料庫異常', 'danger');
      }
    };

    const init = async () => {
      const cfg = await api('/admin/api/config', 'GET', null, false);
      if (!cfg) return;
      document.getElementById('cfg-token').value = cfg.token;
      document.getElementById('cfg-recovery-period').value = cfg.recovery_period;

      delay_period = cfg.recovery_period;

      const initData = await api('/admin/api', 'GET', null, false);
      if (initData) { channels = initData; lastChannelsStr = JSON.stringify(channels); }
      filters = await api('/admin/api/filters', 'GET', null, false);
      renderStats();
      renderChannels();
      renderFilters();
    };

    const renderStats = () => {
      const now = Math.floor(Date.now() / 1000);
      const total = channels.length;
      const enabled = channels.filter(c => c.is_enabled).length;
      const cooling = channels.filter(c => c.is_enabled && (c.last_429 > now)).length;
      const error = channels.filter(c => c.is_enabled && c.consecutive_errors >= 5 && (now - (c.last_error_at || 0) <= 1800)).length;
      const unstable = channels.filter(c => c.is_enabled && c.consecutive_errors > 0 && c.consecutive_errors < 5).length;
      const healthy = enabled - cooling - error - unstable;

      const rpdChannels = channels.filter(c => c.is_enabled && c.rpd_limit > 0);
      const rpdTotal = rpdChannels.reduce((s, c) => s + c.rpd_limit, 0);
      const rpdUsed = rpdChannels.reduce((s, c) => s + ((now - (c.rpd_reset_at || 0)) < 86400 ? (c.rpd_count || 0) : 0), 0);
      const rpdPct = rpdTotal > 0 ? Math.round(rpdUsed / rpdTotal * 100) : -1;
      const rpdColor = rpdPct < 0 ? 'secondary' : rpdPct >= 90 ? 'danger' : rpdPct >= 70 ? 'warning' : 'success';

      const stats = [
        { label: 'Total', val: total, cls: 'text-body-secondary' },
        { label: 'Active', val: healthy, cls: 'text-success' },
        { label: 'Unstable', val: unstable, cls: 'text-warning' },
        { label: 'Error', val: error, cls: 'text-danger' },
        { label: 'Recovery', val: cooling, cls: 'text-info' },
      ];

      let html = '<div class="row g-3 mb-3">';
      html += stats.map(s =>
        '<div class="col-6 col-md-auto flex-grow-1">' +
          '<div class="card border-0 shadow-sm h-100">' +
            '<div class="card-body p-3">' +
              '<div class="small text-muted text-uppercase fw-bold mb-1">' + s.label + '</div>' +
              '<div class="h3 mb-0 fw-normal ' + s.cls + '">' + s.val + '</div>' +
            '</div>' +
          '</div>' +
        '</div>'
      ).join('');

      let rpdContent = '';
      if (rpdTotal > 0) {
        rpdContent =
          '<div class="d-flex justify-content-between align-items-end mb-2">' +
            '<span class="small text-muted text-uppercase fw-bold">Daily RPD Usage</span>' +
            '<span class="fw-bold text-' + rpdColor + '">' + rpdUsed + ' / ' + rpdTotal +
              ' <span class="small text-muted fw-normal">(' + rpdPct + '%)</span></span>' +
          '</div>' +
          '<div class="progress" style="height: 8px;">' +
            '<div class="progress-bar bg-' + rpdColor + '" style="width: ' + Math.min(100, Math.max(0, rpdPct)) + '%"></div>' +
          '</div>';
      } else {
        rpdContent = '<div class="text-muted small py-1"><i class="bi bi-info-circle me-1"></i> No RPD limits configured.</div>';
      }

      html +=
        '<div class="col-12">' +
          '<div class="card border-0 shadow-sm">' +
            '<div class="card-body p-3">' + rpdContent + '</div>' +
          '</div>' +
        '</div></div>';

      document.getElementById('stat-content').innerHTML = html;
    };

    const renderChannels = () => {
      const now = Math.floor(Date.now() / 1000);
      const query = document.getElementById('ch-search').value.toLowerCase();
      let display = [...channels];

      if (sortKey && sortOrder > 0) {
        display.sort((a, b) => {
          let vA, vB;
          if (sortKey === 'status') {
            const rank = (c) => c.consecutive_errors >= 5 ? 2 : (now - (c.last_429 || 0) < delay_period ? 1 : 0);
            vA = rank(a); vB = rank(b);
          } else {
            vA = a[sortKey]; vB = b[sortKey];
          }
          if (typeof vA === 'string') vA = vA.toLowerCase();
          if (typeof vB === 'string') vB = vB.toLowerCase();
          if (vA < vB) return sortOrder === 1 ? -1 : 1;
          if (vA > vB) return sortOrder === 1 ? 1 : -1;
          return 0;
        });
      }

      const filtered = display.filter(c =>
        (c.name || '').toLowerCase().includes(query) ||
        (c.model || '').toLowerCase().includes(query)
      );

      ['id','name','model','weight','status','is_enabled','response_time'].forEach(k => {
        const icon = document.getElementById('sort-' + k);
        if (!icon) return;
        icon.className = 'bi bi-arrow-down-up opacity-25';
        if (k === sortKey) {
          icon.className = sortOrder === 1
            ? 'bi bi-sort-down-alt text-primary opacity-100'
            : 'bi bi-sort-up text-primary opacity-100';
        }
      });

      document.getElementById('channel-list').innerHTML = filtered.map((c) => {
        const realIdx = channels.indexOf(c);
        let hoverMsg = c.last_error_msg || 'Unknown';
        try { hoverMsg = JSON.parse(hoverMsg).message || hoverMsg; } catch (e) {}

        let h = '<span class="badge bg-success health-badge">正常</span>';
        if (c.consecutive_errors >= 5) {
          if (now - (c.last_error_at || 0) > 1800)
            h = '<span class="badge bg-secondary health-badge" title="觀察中" onclick="showDebug(' + realIdx + ')">觀察</span>';
          else
            h = '<span class="badge bg-danger health-badge" title="點擊查看詳細錯誤" onclick="showDebug(' + realIdx + ')">異常</span>';
        } else if (now - (c.last_429 || 0) < delay_period) {
          h = '<span class="badge bg-info health-badge" title="Recovery active" onclick="showDebug(' + realIdx + ')">冷卻</span>';
        } else if (c.consecutive_errors > 0) {
          h = '<span class="badge bg-warning text-dark health-badge" title="點擊查看詳細錯誤" onclick="showDebug(' + realIdx + ')">不穩</span>';
        } else if (c.rpd_limit > 0 && (now - (c.rpd_reset_at || 0)) < 86400 && (c.rpd_count || 0) >= c.rpd_limit) {
          h = '<span class="badge bg-dark health-badge" title="RPD exhausted: ' + c.rpd_count + '/' + c.rpd_limit + '">限額</span>';
        }

        const visionIcon = c.is_vision ? " \u{1F441}\u{FE0F}" : "";
        const toolsIcon = (c.support_tools !== 0) ? " \u{1F527}" : "";
        const modelName = esc(c.model || "");
        const displayName = (c.model || "-");

        let row = '<tr>';
        row += '<td class="text-muted small align-middle">' + (c.id || '-') + '</td>';
        row += '<td class="align-middle"><div class="form-check form-switch d-inline-block">';
        row += '<input class="form-check-input" type="checkbox" ' + (c.is_enabled ? 'checked' : '') + ' onchange="channels[' + realIdx + '].is_enabled=this.checked;renderStats()">';
        row += '</div></td>';
        row += '<td class="fw-bold align-middle">' + esc(c.name) + '</td>';
        row += '<td class="align-middle"><code class="small" style="cursor:pointer" onclick="copyModelName(\'' + modelName + '\')" title="點擊複製">' + displayName + '</code>' + visionIcon + toolsIcon + '</td>';
        row += '<td class="d-none d-sm-table-cell align-middle">' + c.weight + '</td>';
        row += '<td id="ch-latency-' + c.id + '" class="d-none d-sm-table-cell align-middle small text-muted">' + (c.response_time ? (c.response_time + 'ms') : '-') + '</td>';
        row += '<td id="ch-health-' + c.id + '" class="align-middle">' + h + '</td>';
        row += '<td class="align-middle">';
        row += '  <div class="d-none d-md-flex justify-content-center gap-1">';
        row += '    <button onclick="copyChannel(' + realIdx + ')" class="btn btn-sm btn-outline-secondary py-1 px-2" title="Copy Channel"><i class="bi bi-copy"></i></button>';
        row += '    <button onclick="editChannel(' + realIdx + ')" class="btn btn-sm btn-outline-primary py-1 px-2" title="Edit Channel"><i class="bi bi-pencil"></i></button>';
        row += '    <button onclick="resetHealth(' + c.id + ')" class="btn btn-sm btn-outline-success py-1 px-2" title="Reset Health"><i class="bi bi-arrow-repeat"></i></button>';
        row += '    <button onclick="delChannel(' + realIdx + ')" class="btn btn-sm btn-outline-danger py-1 px-2" title="Delete Channel"><i class="bi bi-trash"></i></button>';
        row += '  </div>';
        row += '  <div class="d-md-none dropdown">';
        row += '    <button class="btn btn-sm btn-light py-1 px-2" data-bs-toggle="dropdown"><i class="bi bi-three-dots-vertical"></i></button>';
        row += '    <ul class="dropdown-menu dropdown-menu-end shadow border-0">';
        row += '      <li><button onclick="editChannel(' + realIdx + ')" class="dropdown-item small">Edit</button></li>';
        row += '      <li><button onclick="resetHealth(' + c.id + ')" class="dropdown-item small">Reset Health</button></li>';
        row += '      <li><button onclick="copyChannel(' + realIdx + ')" class="dropdown-item small">Copy</button></li>';
        row += '      <li><button onclick="delChannel(' + realIdx + ')" class="dropdown-item small text-danger">Delete</button></li>';
        row += '    </ul>';
        row += '  </div>';
        row += '</td>';
        row += '</tr>';
        return row;
      }).join('') || '<tr><td colspan="8" class="py-4 text-muted">No channels.</td></tr>';
      initTooltips();
    };

    const copyModelName = (name) => {
      if (!name) return;
      navigator.clipboard.writeText(name)
        .then(() => toast('Model ID 已複製: ' + name, 'success'))
        .catch(() => {
          const t = document.createElement('textarea');
          t.value = name; document.body.appendChild(t);
          t.select(); document.execCommand('copy');
          document.body.removeChild(t);
          toast('Model ID 已複製: ' + name, 'success');
        });
    };

    const clearInput = (id) => { document.getElementById(id).value = ''; };

    const resetHealth = async (id) => {
      if (!id) return toast('請先儲存渠道', 'warning');
      confirmAction('確定重置該渠道健康狀態？', async () => {
        await api('/admin/api/channels/' + id + '/reset-health', 'POST');
        init();
      });
    };

    const updateAdminPass = async () => {
      if (document.activeElement) document.activeElement.blur();
      const p = document.getElementById('new-admin-pass').value;
      if (!p) return toast('請輸入密碼', 'warning');
      confirmAction('更換密碼後將自動登出，確定？', async () => {
        await api('/admin/api/admin-pass', 'POST', { pass: p });
        logout();
      });
    };

    const renderFilters = () => {
      document.getElementById('filter-list').innerHTML = filters.map((f, i) => {
        let row = '<tr>';
        row += '<td class="align-middle"><div class="form-check form-switch d-inline-block"><input class="form-check-input" type="checkbox" ' + (f.is_enabled ? 'checked' : '') + ' onchange="filters[' + i + '].is_enabled=this.checked"></div></td>';
        row += '<td class="align-middle"><input type="text" class="form-control form-control-sm" maxLength="30" placeholder="關鍵字（1-30 字）" value="' + esc(f.text) + '" oninput="filters[' + i + '].text=this.value"></td>';
        row += '<td class="d-none d-sm-table-cell align-middle"><select class="form-select form-select-sm" onchange="filters[' + i + '].mode=parseInt(this.value)"><option value="1" ' + (f.mode == 1 ? 'selected' : '') + '>Truncate</option><option value="0" ' + (f.mode == 0 ? 'selected' : '') + '>Delete</option></select></td>';
        row += '<td class="align-middle"><button onclick="filters.splice(' + i + ',1);renderFilters()" class="btn btn-sm btn-outline-danger py-1 px-2"><i class="bi bi-trash"></i></button></td>';
        row += '</tr>';
        return row;
      }).join('') || '<tr><td colspan="4" class="py-4 text-muted">No filters.</td></tr>';
      initTooltips();
    };

    const saveConfig = async () => {
      await api('/admin/api/config', 'POST', {
        token: document.getElementById('cfg-token').value,
        recovery_period: document.getElementById('cfg-recovery-period').value,
      });
      toast('設定已儲存', 'success');
    };

    const saveAllChannels = async () => {
      await api('/admin/api/batch-channels', 'POST', channels);
      toast('渠道已儲存', 'success');
      init();
    };

    const saveAllFilters = async () => {
      const invalid = filters.filter(f => !f.text || f.text.trim().length === 0 || f.text.length > 30);
      if (invalid.length > 0) return toast('過濾關鍵字長度須介於 1–30 字', 'warning');
      await api('/admin/api/filters', 'POST', filters);
      toast('過濾器已儲存', 'success');
      renderFilters();
    };

    const saveEverything = async () => {
      const cfgEl = document.getElementById('cfg-token');
      if (cfgEl) await api('/admin/api/config', 'POST', {
        token: cfgEl.value,
        recovery_period: document.getElementById('cfg-recovery-period')?.value || 300,
      }).catch(() => {});
      await api('/admin/api/batch-channels', 'POST', channels).catch(() => {});
      const invalid = filters.filter(f => !f.text || f.text.trim().length === 0 || f.text.length > 30);
      if (invalid.length === 0) await api('/admin/api/filters', 'POST', filters).catch(() => {});
      toast('全部已儲存', 'success');
      init();
    };

    const addFilter = () => { filters.push({ text: '', mode: 1, is_enabled: true }); renderFilters(); };

    const openChannelModal = () => {
      document.getElementById('ch-idx').value = '';
      const existingIds = channels.map(c => c.id).filter(i => i !== undefined);
      let nextId = 1; while (existingIds.includes(nextId)) nextId++;
      document.getElementById('ch-id').value = nextId;
      const badge = document.getElementById('ch-id-badge');
      badge.textContent = 'NEW #' + nextId; badge.style.display = '';
      ['ch-name','ch-key','ch-url','ch-model','ch-fallback-model'].forEach(i => document.getElementById(i).value = '');
      document.getElementById('ch-weight').value = 50;
      ['ch-rpm','ch-rpd','ch-tokens'].forEach(i => document.getElementById(i).value = 0);
      document.getElementById('ch-enabled').checked = true;
      document.getElementById('ch-vision').checked = false;
      document.getElementById('ch-tools').checked = true;
      checkFetchModelsBtn();
      chModal.show();
    };

    const editChannel = (idx) => {
      const c = channels[idx];
      document.getElementById('ch-idx').value = idx;
      document.getElementById('ch-id').value = c.id || '';
      const badge = document.getElementById('ch-id-badge');
      if (c.id) { badge.textContent = '#' + c.id; badge.style.display = ''; }
      else { badge.textContent = ''; badge.style.display = 'none'; }
      document.getElementById('ch-name').value = c.name || '';
      document.getElementById('ch-key').value = c.api_key || '';
      document.getElementById('ch-url').value = c.base_url || '';
      document.getElementById('ch-model').value = c.model || '';
      document.getElementById('ch-fallback-model').value = c.fallback_model || '';
      document.getElementById('ch-weight').value = c.weight || 50;
      document.getElementById('ch-tokens').value = c.max_tokens || 0;
      document.getElementById('ch-rpm').value = c.rpm_limit || 0;
      document.getElementById('ch-rpd').value = c.rpd_limit || 0;
      document.getElementById('ch-vision').checked = c.is_vision == 1;
      document.getElementById('ch-tools').checked = c.support_tools !== 0;
      document.getElementById('ch-enabled').checked = c.is_enabled == 1;
      checkFetchModelsBtn();
      chModal.show();
    };

    const showDebug = (idx) => {
      const c = channels[idx];
      if (!c || !c.last_error_msg) return toast('無錯誤資訊', 'warning');
      document.getElementById('debug-time').textContent = new Date(c.last_error_at * 1000).toLocaleString();
      let parsed = null;
      try { parsed = JSON.parse(c.last_error_msg); } catch (e) {}
      if (parsed && typeof parsed === 'object') {
        document.getElementById('debug-msg').value = typeof parsed.message === 'object' ? JSON.stringify(parsed.message, null, 2) : (parsed.message || '');
        document.getElementById('debug-url').value = parsed.url || '';
        document.getElementById('debug-req').value = typeof parsed.request === 'object' ? JSON.stringify(parsed.request, null, 2) : (parsed.request || '');
        document.getElementById('debug-res').value = typeof parsed.response === 'object' ? JSON.stringify(parsed.response, null, 2) : (parsed.response || '');
        document.getElementById('debug-url-wrapper').style.display = 'block';
        document.getElementById('debug-req-res-wrapper').style.display = 'flex';
      } else {
        document.getElementById('debug-msg').value = c.last_error_msg;
        document.getElementById('debug-url-wrapper').style.display = 'none';
        document.getElementById('debug-req-res-wrapper').style.display = 'none';
      }
      debugModal.show();
    };

    const applyChannel = () => {
      if (document.activeElement) document.activeElement.blur();
      const idx = document.getElementById('ch-idx').value;
      const name = document.getElementById('ch-name').value.trim();
      if (!name) return toast('請輸入名稱', 'warning');
      const weight = parseInt(document.getElementById('ch-weight').value);
      if (isNaN(weight) || weight < 1 || weight > 100) return toast('Weight 需介於 1-100', 'warning');
      const url = document.getElementById('ch-url').value.trim().replace(/\/+$/, '');
      if (!url) return toast('請輸入 Base URL', 'warning');

      const prev = idx !== '' ? channels[idx] : null;
      const idVal = document.getElementById('ch-id').value;
      const ch = {
        id: idVal ? parseInt(idVal) : undefined,
        name,
        api_key: document.getElementById('ch-key').value,
        base_url: url,
        model: document.getElementById('ch-model').value,
        fallback_model: document.getElementById('ch-fallback-model').value,
        weight,
        max_tokens: parseInt(document.getElementById('ch-tokens').value) || 0,
        rpm_limit: parseInt(document.getElementById('ch-rpm').value) || 0,
        rpd_limit: parseInt(document.getElementById('ch-rpd').value) || 0,
        is_vision: document.getElementById('ch-vision').checked ? 1 : 0,
        support_tools: document.getElementById('ch-tools').checked ? 1 : 0,
        is_enabled: document.getElementById('ch-enabled').checked ? 1 : 0,
        last_429: prev ? prev.last_429||0 : 0,
        consecutive_errors: prev ? prev.consecutive_errors||0 : 0,
        last_error_msg: prev ? prev.last_error_msg||'' : '',
        last_error_at: prev ? prev.last_error_at||0 : 0,
        response_time: prev ? prev.response_time||0 : 0,
        rpm_count: prev ? prev.rpm_count||0 : 0,
        rpm_reset_at: prev ? prev.rpm_reset_at||0 : 0,
        rpd_count: prev ? prev.rpd_count||0 : 0,
        rpd_reset_at: prev ? prev.rpd_reset_at||0 : 0,
      };
      if (idx !== '') channels[parseInt(idx)] = ch;
      else channels.push(ch);
      chModal.hide();
      renderChannels();
      renderStats();
      toast(idx !== '' ? '已修改，請 SAVE 儲存' : '已新增，請 SAVE 儲存', 'success');
    };

    const delChannel = (idx) => {
      confirmAction('確定刪除此渠道？', () => {
        channels.splice(idx, 1);
        renderChannels();
        renderStats();
      });
    };

    const copyChannel = (idx) => {
      const src = channels[idx];
      channels.push({
        ...src,
        name: src.name + ' (copy)',
        id: undefined,
        last_429: 0,
        consecutive_errors: 0,
        last_error_msg: '',
        last_error_at: 0,
      });
      renderChannels();
      renderStats();
    };

    const toggleKeyVis = () => {
      const i = document.getElementById('ch-key');
      i.type = i.type === 'password' ? 'text' : 'password';
    };

    let fetchedModels = [];
    let currentModelTarget = 'primary';

    const checkFetchModelsBtn = () => {
      const url = document.getElementById('ch-url').value.trim();
      const disabled = url.length === 0;
      document.getElementById('btn-fetch-models-primary').disabled = disabled;
      document.getElementById('btn-fetch-models-fallback').disabled = disabled;
    };

    const fetchModels = async (target) => {
      currentModelTarget = target;
      const btnId = target === 'primary' ? 'btn-fetch-models-primary' : 'btn-fetch-models-fallback';
      const btn = document.getElementById(btnId);
      const originalContent = btn.innerHTML;
      const url = document.getElementById('ch-url').value.trim();
      const key = document.getElementById('ch-key').value.trim();
      if (!url) return;

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
      try {
        const data = await api('/admin/api/proxy-models', 'POST', { url, key }, false);
        if (data && (data.data || Array.isArray(data))) {
          fetchedModels = data.data || (Array.isArray(data) ? data.map(m => typeof m === 'string' ? { id: m } : m) : []);
          document.getElementById('model-search').value = '';
          renderModelList();
          chModal.hide();
          modelsModal.show();
        }
      } catch (e) {
        toast('獲取模型失敗: ' + e.message, 'danger');
      } finally {
        btn.disabled = false;
        btn.innerHTML = originalContent;
      }
    };

    const renderModelList = () => {
      const q = document.getElementById('model-search').value.toLowerCase();
      const list = fetchedModels.filter(m => (m.id || m.name || '').toLowerCase().includes(q));
      document.getElementById('models-list').innerHTML = list.map(m => {
        const idName = m.id || m.name;
        const safeId = esc(idName);
        const maxTokens = m.max_tokens || 0;
        const rpm = m.rpm || 0;
        const rpd = m.rpd || 0;

        let limitText = '';
        if (m.max_tokens) limitText += 'MaxTokens: ' + m.max_tokens + ' ';
        if (m.rpm) limitText += 'RPM: ' + m.rpm + ' ';
        const subText = limitText ? '<br><small class="text-muted">' + limitText + '</small>' : '';

        return '<button class="list-group-item list-group-item-action py-2" onclick="selectModel(\'' + safeId + '\', ' + maxTokens + ', ' + rpm + ', ' + rpd + ')"><strong>' + safeId + '</strong>' + subText + '</button>';
      }).join('') || '<div class="p-3 text-center text-muted">No models found</div>';
    };

    const selectModel = (modelId, maxTokens, rpm, rpd) => {
      const id = (modelId || '').toLowerCase();
      if (currentModelTarget === 'primary') {
        document.getElementById('ch-model').value = modelId;
        if (maxTokens) document.getElementById('ch-tokens').value = maxTokens;
        if (rpm) document.getElementById('ch-rpm').value = rpm;
        if (rpd) document.getElementById('ch-rpd').value = rpd;
        const visionKeywords = ['vision', 'claude-3', 'gpt-4o', 'gemini-1.5', 'gemini-exp', 'gpt-4-turbo'];
        const hasVision = visionKeywords.some(k => id.includes(k));
        document.getElementById('ch-vision').checked = hasVision;
        document.getElementById('ch-tools').checked = true;
      } else {
        document.getElementById('ch-fallback-model').value = modelId;
      }
      modelsModal.hide();
      chModal.show();
    };

    const toggleSort = (key) => {
      if (sortKey === key) {
        sortOrder = (sortOrder + 1) % 3;
        if (sortOrder === 0) sortKey = null;
      } else {
        sortKey = key; sortOrder = 1;
      }
      renderChannels();
    };

    const toggleAllChannels = (val) => {
      channels.forEach(c => c.is_enabled = val);
      renderChannels();
      renderStats();
      toast(val ? '已開啟所有渠道' : '已關閉所有渠道', 'info');
    };

    const resetAllHealth = async () => {
      confirmAction('重置所有渠道健康狀態？', async () => {
        await api('/admin/api/channels/reset-all-health', 'POST');
        init();
      });
    };

    const refreshHealthOnly = async () => {
      if (document.body.classList.contains('modal-open')) return;
      try {
        const res = await api('/admin/api', 'GET', null, false);
        if (!res) return;
        const now = Math.floor(Date.now() / 1000);
        res.forEach(nc => {
          const realIdx = channels.findIndex(c => c.id === nc.id);
          if (realIdx === -1) return;
          const oc = channels[realIdx];
          oc.last_429 = nc.last_429;
          oc.consecutive_errors = nc.consecutive_errors;
          oc.last_error_at = nc.last_error_at;
          oc.last_error_msg = nc.last_error_msg;
          oc.response_time = nc.response_time;
          oc.rpd_count = nc.rpd_count;
          oc.rpd_reset_at = nc.rpd_reset_at;

          const healthEl = document.getElementById('ch-health-' + oc.id);
          if (healthEl) {
            let h = '<span class="badge bg-success health-badge">正常</span>';
            if (oc.consecutive_errors >= 5) {
              if (now - (oc.last_error_at || 0) > 1800)
                h = '<span class="badge bg-secondary health-badge" title="觀察中" onclick="showDebug(' + realIdx + ')">觀察</span>';
              else
                h = '<span class="badge bg-danger health-badge" title="點擊查看詳細錯誤" onclick="showDebug(' + realIdx + ')">異常</span>';
            } else if (oc.last_429 > now) {
              h = '<span class="badge bg-info health-badge" title="冷卻中" onclick="showDebug(' + realIdx + ')">冷卻</span>';
            } else if (oc.consecutive_errors > 0) {
              h = '<span class="badge bg-warning text-dark health-badge" title="點擊查看詳細錯誤" onclick="showDebug(' + realIdx + ')">不穩</span>';
            } else if (oc.rpd_limit > 0 && (now - (oc.rpd_reset_at || 0)) < 86400 && (oc.rpd_count || 0) >= oc.rpd_limit) {
              h = '<span class="badge bg-dark health-badge" title="RPD 限額">限額</span>';
            }
            healthEl.innerHTML = h;
          }
          const latencyEl = document.getElementById('ch-latency-' + oc.id);
          if (latencyEl) latencyEl.textContent = oc.response_time ? (oc.response_time + 'ms') : '-';
        });
        renderStats();
      } catch (e) { }
    };

    const startAutoRefresh = () => {
      if (refreshTimer) clearInterval(refreshTimer);
      refreshTimer = setInterval(refreshHealthOnly, 15000);
    };

    const exportJson = () => {
      const now = new Date();
      const pad = (n) => String(n).padStart(2, '0');
      const ts = now.getFullYear() + pad(now.getMonth()+1) + pad(now.getDate()) + '-' + pad(now.getHours()) + pad(now.getMinutes()) + pad(now.getSeconds());
      const cleanChannels = channels.map(c => ({
        name: c.name,
        base_url: c.base_url,
        model: c.model,
        fallback_model: c.fallback_model || "",
        weight: c.weight || 50,
        is_enabled: c.is_enabled ? 1 : 0,
        is_vision: c.is_vision ? 1 : 0,
        rpm_limit: c.rpm_limit || 0,
        rpd_limit: c.rpd_limit || 0,
        max_tokens: c.max_tokens || 0,
        support_tools: c.support_tools !== 0 ? 1 : 0,
      }));
      const cleanFilters = filters.map(f => ({ text: f.text, mode: f.mode || 1, is_enabled: f.is_enabled ? 1 : 0 }));
      const data = {
        channels: cleanChannels,
        filters: cleanFilters,
        config: {
          token: document.getElementById('cfg-token').value,
          recovery_period: document.getElementById('cfg-recovery-period').value,
        },
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'api-gateway-' + ts + '.json';
      a.click();
    };

    const importJson = (e) => {
      const r = new FileReader();
      r.onload = async (ev) => {
        const d = JSON.parse(ev.target.result);
        if (await api('/admin/api/import-all', 'POST', d)) {
          toast('匯入成功', 'success');
          init();
        }
      };
      r.readAsText(e.target.files[0]);
    };

    const resetSystem = async () => {
      confirmAction('重置系統將清除所有頻道、過濾器與設定（不含密碼），確定？', async () => {
        await api('/admin/api/reset', 'POST');
        location.reload();
      });
    };

    const checkAuth = async () => {
      const ac = new AbortController();
      const to = setTimeout(() => ac.abort(), 8000);
      try {
        const authRes = await fetch('/admin/api/auth-status', { signal: ac.signal });
        clearTimeout(to);
        const authData = await authRes.json();
        if (authData.needsSetup) { showSetup(); return; }

        const storedToken = sessionStorage.getItem('adminToken');
        if (storedToken) {
          const r = await fetch('/admin/api/verify-token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: storedToken }),
          });
          const data = await r.json();
          if (data.valid) {
            sessionStorage.setItem('adminLoggedIn', '1');
            showAdmin();
            startAutoRefresh();
          } else {
            sessionStorage.removeItem('adminToken');
            sessionStorage.removeItem('adminLoggedIn');
            showLogin();
          }
        } else {
          showLogin();
        }
      } catch (e) {
        clearTimeout(to);
        showLogin();
      }
    };

    let loaded = false;
    const forceShow = () => {
      if (loaded) return;
      loaded = true;
      const el = document.getElementById('loading-overlay');
      if (el) el.classList.add('hide');
      document.body.classList.remove('loading');
    };
    setTimeout(forceShow, 20000);

    window.onload = () => {
      try {
        const theme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', theme);
        document.getElementById('theme-icon').className = theme === 'dark' ? 'bi bi-moon-fill' : 'bi bi-sun';
        try {
          chModal = new bootstrap.Modal(document.getElementById('chModal'), { backdrop: 'static' });
          passModal = new bootstrap.Modal(document.getElementById('passModal'), { backdrop: 'static' });
          debugModal = new bootstrap.Modal(document.getElementById('debugModal'), { backdrop: 'static' });
          modelsModal = new bootstrap.Modal(document.getElementById('modelsModal'), { backdrop: 'static' });
          modelsModal._element.addEventListener('hidden.bs.modal', () => { if (chModal) chModal.show(); });
        } catch (e) { console.warn('[modal]', e); }
        const goTopBtn = document.getElementById('go-top-btn');
        if (goTopBtn) {
          const updateGoTop = () => {
            goTopBtn.style.display = (!document.body.classList.contains('modal-open') && window.scrollY > 200) ? 'block' : 'none';
          };
          window.addEventListener('scroll', updateGoTop);
        }
      } catch (e) { console.error('[init]', e); }
      checkAuth();
    };
  </script>
</body>
</html>
